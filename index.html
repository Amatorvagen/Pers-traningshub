function totalPP(log) {
if (!log.steges) return 0;
return log.steges.reduce((sum,s)=>
sum+(s.two?.pp||0)+(s.three?.pp||0)+(s.five?.pp||0)+((s.showTen&&s.ten?.pp)||0),0);
}

// Antal rena/gjorda reps (exkl. 10-stegen om den inte lagts till)
function stegeIsDone(s) {
return (s.two?.done||false)||(s.three?.done||false)||(s.five?.done||false)||(s.showTen&&(s.ten?.done||false));
}

async function dbLoadLogs() {
const {data,error} = await sb.from("training_logs").select("*").order("date",{ascending:false});
if (error) throw new Error("Fel vid hämtning av loggar: " + error.message);
if (!data) return [];
return data.map(r => {
const entry = r.data || {};
return {...entry, id: r.id, date: r.date};
});
}
async function dbSaveLog(entry) {
const {id, date, ...data} = entry;
const {error} = await sb.from("training_logs").upsert({id, date, data:{...data,id,date}},{onConflict:"id"});
if (error) throw error;
}
async function dbDeleteLog(id) {
const {error} = await sb.from("training_logs").delete().eq("id",id);
if (error) throw error;
}

const {data,error} = await sb.from("app_state").select("value").eq("key",key).single();
if (error) return null;
return data?.value || null;
}

const {error} = await sb.from("app_state").upsert({key, value});
if (error) throw error;
}

function RepCell({label, kg, pp, done, maxReps, split, showSplit, onKg, onPP, onDone, onSplit}) {
const {useState:us, useEffect:ue, useRef:ur} = React;
const [localDone, setLocalDone] = us(done||false);
const [localPP, setLocalPP] = us(pp||0);
const timerRef = ur(null);
const LOCK_DELAY = 3000; // 3 sekunder inaktivitet → låser cellen

// Synka utifrån om cellen redigeras externt (t.ex. vid edit av gammalt pass)
ue(()=>{ setLocalDone(done||false); },[done]);
ue(()=>{ setLocalPP(pp||0); },[pp]);

function resetTimer() {
clearTimeout(timerRef.current);
timerRef.current = setTimeout(()=>{
// Lås cellen efter inaktivitet – anropa parent med aktuell state
onDone(true, localPP);
setLocalDone(true);
}, LOCK_DELAY);
}

function handleDone() {
setLocalDone(true);
onDone(true, localPP);
clearTimeout(timerRef.current);
}

function handleUndo() {
setLocalDone(false);
setLocalPP(0);
onDone(false, 0);
clearTimeout(timerRef.current);
}

function handlePP(newPP) {
const clamped = Math.max(0, Math.min(maxReps, newPP));
setLocalPP(clamped);
onPP(clamped);
if (!localDone) resetTimer();
}

ue(()=>()=>clearTimeout(timerRef.current), []);

const clean = maxReps - localPP;
const hasActivity = localDone || localPP > 0;
const isClean = localPP === 0 && !split;
const WEIGHTS = ["16","20","24"];

// Färger baserat på state
let bg, border;
if (!hasActivity) { bg=C.surface; border=C.border; }
else if (localPP > 0) { bg=C.orangeBg; border=C.orangeBorder; }
else { bg="#f4f8ee"; border=C.abcBorder; }

return (
<div style={{border:`1px solid ${border}`,borderRadius:7,padding:"7px 8px",background:bg,display:"flex",flexDirection:"column",gap:5,transition:"background 0.2s,border-color 0.2s"}}>

// ── TIMER ──
function TimerView() {
const [sets, setSets] = useState("20");
const [secPerSet, setSecPerSet] = useState("90");
const [phase, setPhase] = useState("idle");
const [currentSet, setCurrentSet] = useState(0);
const [timeLeft, setTimeLeft] = useState(0);
const [pauseLog, setPauseLog] = useState([]);
const [totalPauseSeconds, setTotalPauseSeconds] = useState(0);

const setEndRef = useRef(null);
const pauseStartRef = useRef(null);
const tickRef = useRef(null);
const audioCtxRef = useRef(null);

const totalSets = parseInt(sets) || 0;
const sPerSet = parseInt(secPerSet) || 90;

function getAudio() {
if (!audioCtxRef.current)
audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
return audioCtxRef.current;
}

function beep(freq, dur, vol=0.4, delay=0) {
try {
const ctx = getAudio();
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.connect(gain); gain.connect(ctx.destination);
osc.frequency.value = freq; osc.type = "sine";
const t = ctx.currentTime + delay;
gain.gain.setValueAtTime(vol, t);
gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
osc.start(t); osc.stop(t + dur);
} catch(e) {}
}

function beepNewSet()  { beep(880, 0.15, 0.5); }
function beepCount()   { beep(660, 0.08, 0.2); }
function beepDone()    { beep(1046,0.15,0.5); beep(1318,0.15,0.5,0.2); beep(1568,0.25,0.5,0.4); }

function startTick(endTime) {
clearInterval(tickRef.current);
tickRef.current = setInterval(() => {
const left = Math.max(0, Math.round((endTime - Date.now()) / 1000));
setTimeLeft(left);
if (left === 3 || left === 2 || left === 1) beepCount();
if (left === 0) {
clearInterval(tickRef.current);
setCurrentSet(cs => {
const next = cs + 1;
if (next > totalSets) {
setPhase("done");
beepDone();
return cs;
}
beepNewSet();
const newEnd = Date.now() + sPerSet * 1000;
setEndRef.current = newEnd;
setTimeLeft(sPerSet);
startTick(newEnd);
return next;
});
}
}, 500);
}

function start() {
getAudio();
const endTime = Date.now() + sPerSet * 1000;
setEndRef.current = endTime;
setPhase("running");
setCurrentSet(1);
setTimeLeft(sPerSet);
setPauseLog([]);
setTotalPauseSeconds(0);
beepNewSet();
startTick(endTime);
}

function pause() {
clearInterval(tickRef.current);
pauseStartRef.current = Date.now();
setPhase("paused");
}

function resume() {
const pausedFor = Math.round((Date.now() - pauseStartRef.current) / 1000);
setTotalPauseSeconds(p => p + pausedFor);
setPauseLog(pl => {
const entry = {set: currentSet, seconds: pausedFor};
return [...pl, entry];
});
const newEnd = setEndRef.current + (Date.now() - pauseStartRef.current);
setEndRef.current = newEnd;
setPhase("running");
startTick(newEnd);
}

function stop() {
clearInterval(tickRef.current);
setPhase("idle");
setCurrentSet(0);
setTimeLeft(0);
setPauseLog([]);
setTotalPauseSeconds(0);
}

useEffect(() => () => clearInterval(tickRef.current), []);

const pct = phase === "running" ? ((sPerSet - timeLeft) / sPerSet) * 100 : 0;
const radius = 80;
const circ = 2 * Math.PI * radius;
const strokeDash = circ - (pct / 100) * circ;
const isLast3 = phase === "running" && timeLeft <= 3 && timeLeft > 0;
const cardStyle = {background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 20px",marginBottom:14,boxShadow:`0 1px 3px ${C.shadow}`};

function fmtSec(s) { return s < 60 ? `${s} sek` : `${Math.floor(s/60)} min ${s%60} sek`; }

return (
<div style={{display:"flex",flexDirection:"column",gap:14}}>
{phase === "idle" && (
<div style={cardStyle}>
<div style={labelStyle}>Timer</div>
<div style={{display:"flex",gap:16,marginTop:12,flexWrap:"wrap"}}>
<div style={{flex:1,minWidth:100}}>
<label style={{display:"block",fontSize:"0.65rem",color:C.muted,marginBottom:6,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase"}}>Antal set</label>
<input type="number" value={sets} onChange={e=>setSets(e.target.value)} style={{...IS,fontSize:"16px",width:"100%"}}/>
</div>
<div style={{flex:1,minWidth:100}}>
<label style={{display:"block",fontSize:"0.65rem",color:C.muted,marginBottom:6,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase"}}>Sek / set</label>
<input type="number" value={secPerSet} onChange={e=>setSecPerSet(e.target.value)} style={{...IS,fontSize:"16px",width:"100%"}}/>
</div>
</div>
<div style={{marginTop:10,fontSize:"0.65rem",color:C.faint}}>
Total tid: {Math.floor(totalSets * sPerSet / 60)} min {(totalSets * sPerSet) % 60} sek
</div>
</div>
)}

<div style={{...cardStyle,textAlign:"center",padding:"28px 20px"}}>
{phase === "done" ? (
<div>
<div style={{fontSize:"3rem",marginBottom:8}}>🎯</div>
<div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.4rem",fontWeight:800,color:C.accent,marginBottom:6}}>Klart!</div>
<div style={{fontSize:"0.8rem",color:C.muted,marginBottom:4}}>{totalSets} set · {sPerSet} sek/set</div>
{pauseLog.length > 0 && (
<div style={{marginTop:10,background:C.bg,borderRadius:8,padding:"10px 14px",textAlign:"left"}}>
<div style={{fontSize:"0.6rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.faint,marginBottom:6,fontWeight:600}}>Pauser</div>
{pauseLog.map((p,i)=>(
<div key={i} style={{fontSize:"0.68rem",color:C.muted,marginBottom:3}}>Set {p.set}: {fmtSec(p.seconds)}</div>
))}
<div style={{fontSize:"0.7rem",color:C.orange,marginTop:6,fontWeight:600}}>Totalt pausat: {fmtSec(totalPauseSeconds)}</div>
</div>
)}
</div>
) : (phase === "running" || phase === "paused") ? (
<div>
<div style={{fontSize:"0.65rem",letterSpacing:"0.12em",textTransform:"uppercase",color:C.faint,marginBottom:12,fontWeight:600}}>
Set {currentSet} av {totalSets}
{phase === "paused" && <span style={{color:C.orange,marginLeft:8}}>· Pausad</span>}
</div>
<div style={{position:"relative",display:"inline-block",marginBottom:16}}>

// ── CLAUDE SUMMARY EXPORT ──
function ClaudeSummary({logs, goals, passIndex}) {
const [copied, setCopied] = useState(false);

function buildSummary() {
const today = new Date();
const allLogs = [...logs].sort((a,b) => a.date.localeCompare(b.date));

const abcLogs = logs.filter(l=>l.type==="ABC"&&l.sets);
const pressLogs = logs.filter(l=>l.type==="Press"&&l.steges);
const wwLogs = logs.filter(l=>l.type==="WW");

const bestABC = abcLogs.reduce((best,l)=>
!best||(Number(l.sets)>Number(best.sets))?l:best, null);
const latestABC = abcLogs[abcLogs.length-1];
const latestPress = pressLogs[pressLogs.length-1];

const FEEL = ["💀","😓","😐","💪","🔥"];
const SLEEP = ["","★","★★","★★★","★★★★","★★★★★"];
const STRESS = ["","▲","▲▲","▲▲▲","▲▲▲▲","▲▲▲▲▲"];

let lines = [];
lines.push(`TRÄNINGSDATA – exporterad ${today.toLocaleDateString("sv-SE")}`);
lines.push(`Program: ${goals.programName||"ABF"} · Mål: ${goals.goalDate||"31 dec 2026"}`);
lines.push(`Schema-index: pass ${passIndex} av 25`);
lines.push(`Totalt: ${logs.length} pass (${pressLogs.length} Press · ${abcLogs.length} ABC · ${wwLogs.length} WW)`);
lines.push("");

if (bestABC) lines.push(`Bästa ABC: ${bestABC.sets} set @ ${bestABC.secPerSet}s (${bestABC.date})`);
if (latestABC) lines.push(`Senaste ABC: ${latestABC.sets} set @ ${latestABC.secPerSet}s (${latestABC.date})`);
if (latestPress) {
const pp = totalPP(latestPress);
lines.push(`Senaste Press: ${latestPress.steges?.length||0} stegar · ${pp===0?"rent":pp+" PP"} (${latestPress.date})`);
}
lines.push("");
lines.push("ALLA PASS:");

const wkRanges = [
["2026-03-30","2026-04-06","V1"],["2026-04-07","2026-04-13","V2"],
["2026-04-14","2026-04-20","V3"],["2026-04-21","2026-04-27","V4"],
["2026-04-28","2026-05-04","V5"],["2026-05-05","2026-05-11","V6"],
["2026-05-12","2026-05-18","V7"],["2026-05-19","2026-05-25","V8"],
];

wkRanges.forEach(([from,to,label])=>{
const wl = allLogs.filter(l=>l.date>=from&&l.date<=to);
if (wl.length===0) return;
lines.push(`${label}:`);
wl.forEach(l=>{
let detail = "";
if (l.type==="ABC") {
detail = `${l.sets} set @ ${l.secPerSet}s`;
if (l.pauses?.length>0) detail += ` · ${l.pauses.length} paus`;
if (l.bonusSets&&Number(l.bonusSets)>0) detail += ` · +${l.bonusSets}@20`;
} else if (l.type==="Press") {
detail = `${l.steges?.length||0} stegar · ${totalPP(l)===0?"rent":totalPP(l)+" PP"}`;
} else if (l.type==="WW") {
detail = `${l.wwRounds?.length||0} ronder · ${l.wwKg||"?"}kg · ${l.wwRounds?.filter(r=>r.length===5).length||0} kompl`;
} else if (l.type==="Annat") {
detail = l.otherTitle||"";
}
const feeling = FEEL[l.feeling??2];
const sleep = SLEEP[l.sleep||2];
const stress = STRESS[l.stress||2];
const prehab = [l.prehabArms&&"armar",l.prehabKnees&&"knän"].filter(Boolean).join("+");

lines.push(`  ${l.date} ${l.type}: ${detail} · ${feeling} sömn:${sleep} stress:${stress}${prehab?" · prehab:"+prehab:""}`);
if (l.bodyLog) lines.push(`    kropp: ${l.bodyLog}`);
if (l.notes) lines.push(`    not: ${l.notes}`);
if (l.type==="WW"&&l.wwNotes) lines.push(`    ww-not: ${l.wwNotes}`);
});
});

const allScheduledDates = new Set(wkRanges.flatMap(([f,t])=>
allLogs.filter(l=>l.date>=f&&l.date<=t).map(l=>l.date)
));
const unscheduled = allLogs.filter(l=>!allScheduledDates.has(l.date));
if (unscheduled.length>0) {
lines.push("Övriga pass:");
unscheduled.forEach(l=>{
lines.push(`  ${l.date} ${l.type}: ${l.otherTitle||l.wwNotes||""}`);
if(l.bodyLog) lines.push(`    kropp: ${l.bodyLog}`);
});
}

return lines.join("\n");
}

function handleCopy() {
const text = buildSummary();
navigator.clipboard.writeText(text).then(()=>{
setCopied(true);
setTimeout(()=>setCopied(false),3000);
}).catch(()=>{
const el = document.getElementById("claude-summary-ta");
if(el){el.select();document.execCommand("copy");}
setCopied(true);
setTimeout(()=>setCopied(false),3000);
});
}

const summary = buildSummary();

return (
<div style={{display:"flex",flexDirection:"column",gap:8}}>
<textarea id="claude-summary-ta" readOnly value={summary} rows={10}
style={{...IS,fontSize:"0.58rem",color:C.muted,resize:"none",fontFamily:"monospace",lineHeight:1.6}}/>
<button onClick={handleCopy} style={{
background:copied?C.accentMid:C.accent,border:"none",color:"#fff",
padding:"11px 18px",borderRadius:7,cursor:"pointer",
fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.8rem",
touchAction:"manipulation",
}}>
{copied?"✓ Kopierat! Klistra in i Claude →":"Kopiera sammanfattning"}
</button>
</div>
);
}

// Helper: format a single rep-cell summary with weight always visible
function repSummary(d, reps) {
if (!d) return null;
const pp = d.pp || 0;
const split = d.split || "";
const clean = reps - pp;
if (split) return `${split}`;
if (pp === 0) return `${reps}×${d.kg}✓`;
return `${clean}✓+${pp}PP×${d.kg}`;
}

const pp=totalPP(l);
const feeling = l.feeling ?? 2;
const cardStyle={background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"13px 15px",boxShadow:`0 1px 3px ${C.shadow}`,cursor:"pointer"};
return (
<div style={cardStyle} onClick={()=>onSelect&&onSelect(l)}>

<div style={{display:"flex",gap:8,alignItems:"center"}}>

{pp>0&&<span style={{fontSize:"0.65rem",color:C.orange,background:C.orangeBg,border:`1px solid ${C.orangeBorder}`,padding:"2px 7px",borderRadius:4}}>PP:{pp}</span>}

{[{d:s.two,reps:2,label:"2r"},{d:s.three,reps:3,label:"3r"},{d:s.five,reps:5,label:"5r"},{d:s.ten||{kg:"16",pp:0,split:""},reps:10,label:"10r"}].map(({d,reps,label})=>{

function App() {
const [logs,setLogs]=useState([]);
const [form,setForm]=useState(emptyForm);
const [view,setView]=useState("home");
const [saved,setSaved]=useState(false);
const [loading,setLoading]=useState(true);
const [dbError,setDbError]=useState(null);
const [confirmId,setConfirmId]=useState(null);
const [selectedLog,setSelectedLog]=useState(null);
const [passIndex,setPassIndex]=useState(0);
const [goals,setGoals]=useState({
abcTargetSets:23, abcTargetSec:78,
press2kg:"24", press3kg:"24", press5kg:"20", press10kg:"16",
programName:"ABF", goalDate:"31 dec 2026",
});
const [passOutcomes,setPassOutcomes]=useState({});
const [quote]=useState(()=>QUOTES[Math.floor(Math.random()*QUOTES.length)]);
const [selectedProgram,setSelectedProgram]=useState(null);
const draftTimerRef = useRef(null);

useEffect(()=>{
async function load() {
try {
const [fetchedLogs, idxVal, draftVal, outcomesVal, goalsVal] = await Promise.all([
dbLoadLogs(),
dbLoadState("pass-index"),
dbLoadState(DRAFT_KEY),
dbLoadState("pass-outcomes"),
dbLoadState("goals"),
]);
setLogs(fetchedLogs);
if (idxVal !== null) setPassIndex(Number(idxVal));
if (draftVal) {
try {
const draft = JSON.parse(draftVal);
if (!draft.wwRounds || draft.wwRounds.length === 0) draft.wwRounds = [[]];
// Datum alltid dagens datum, oavsett vad som sparats i draft
draft.date = todayStr();
setForm(draft);
} catch(e) {}
}
if (outcomesVal) {
try {
const raw = JSON.parse(outcomesVal);
const fixed = {};
Object.entries(raw).forEach(([k,v]) => { fixed[Number(k)] = v; });
setPassOutcomes(fixed);
} catch(e) {}
}
if (goalsVal) { try { setGoals(g=>({...g,...JSON.parse(goalsVal)})); } catch(e) {} }
} catch(e) {
setDbError("Databasfel: " + e.message);
}
setLoading(false);
}
load();
},[]);

useEffect(() => {
if (loading) return;
clearTimeout(draftTimerRef.current);
draftTimerRef.current = setTimeout(async () => {
try { await dbSaveState(DRAFT_KEY, JSON.stringify(form)); } catch(e) {}
}, 10000);
return () => clearTimeout(draftTimerRef.current);
}, [form]);

async function handleSubmit() {
if (!form.date||!form.type) return;
const entry={...form, id: form.id || Date.now()};
try {
await dbSaveLog(entry);
const nl=[entry,...logs].sort((a,b)=>b.date.localeCompare(a.date));
setLogs(nl);

// Auto-markera schema-pass som klart om datum matchar och är nästa pass
const allScheduledPasses = [
...WEEK_SCHEDULE.flatMap(w=>w.passes.filter(Boolean)),
...GIANT_SCHEDULE.flatMap(w=>w.passes.filter(Boolean)),
];
const currentPass = allScheduledPasses[passIndex];
const loggedDate = form.date;
// Kolla om loggad datum faller inom rätt vecka för nuvarande pass
if (currentPass && !form.id) {
// Hitta vecko-datumintervall för detta pass
const allRanges = [
["2026-03-30","2026-04-06"],["2026-04-07","2026-04-13"],
["2026-04-14","2026-04-20"],["2026-04-21","2026-04-27"],
["2026-04-28","2026-05-04"],["2026-05-05","2026-05-11"],
["2026-05-12","2026-05-18"],["2026-05-19","2026-05-25"],
["2026-05-26","2026-05-31"],
["2026-06-01","2026-06-07"],["2026-06-08","2026-06-14"],
["2026-06-15","2026-06-21"],["2026-06-22","2026-06-28"],
["2026-06-29","2026-07-05"],["2026-07-06","2026-07-12"],
["2026-07-13","2026-07-19"],["2026-07-20","2026-07-26"],
];
// Räkna ut vilken vecko-index detta pass tillhör
let passCount=0, weekForPass=-1;
for(let wi=0;wi<WEEK_SCHEDULE.length;wi++){
const ps=WEEK_SCHEDULE[wi].passes.filter(Boolean);
if(passIndex>=passCount&&passIndex<passCount+ps.length){weekForPass=wi;break;}
passCount+=ps.length;
}
if(weekForPass===-1){
let gc=0;
for(let wi=0;wi<GIANT_SCHEDULE.length;wi++){
const ps=GIANT_SCHEDULE[wi].passes.filter(Boolean);
const gi=passIndex-WEEK_SCHEDULE.flatMap(w=>w.passes.filter(Boolean)).length;
if(gi>=gc&&gi<gc+ps.length){weekForPass=WEEK_SCHEDULE.length+wi;break;}
gc+=ps.length;
}
}
const range = allRanges[weekForPass];
if(range && loggedDate>=range[0] && loggedDate<=range[1]){
await advancePass("done");
}
}

const fresh={...emptyForm,date:todayStr()};
setForm(fresh);
await dbSaveState(DRAFT_KEY, JSON.stringify(fresh));
setSaved(true);
setTimeout(()=>setSaved(false),2000);
setView("history");
} catch(e) { alert("Kunde inte spara passet: "+e.message); }
}

async function saveGoals(g) {

}

async function deleteLog(id) {
try {
await dbDeleteLog(id);
setLogs(logs.filter(l=>l.id!==id));
} catch(e) { alert("Kunde inte radera: "+e.message); }
}

async function advancePass(outcome) {
const newOutcomes = {...passOutcomes, [passIndex]: outcome};
setPassOutcomes(newOutcomes);
const newIdx = passIndex + 1;
setPassIndex(newIdx);
try {
await Promise.all([
dbSaveState("pass-index", String(newIdx)),
dbSaveState("pass-outcomes", JSON.stringify(newOutcomes)),
]);
} catch(e) { console.error(e); }
}

async function undoAdvance() {
if (passIndex === 0) return;
const newIdx = passIndex - 1;
const newOutcomes = {...passOutcomes};
delete newOutcomes[newIdx];
setPassIndex(newIdx);
setPassOutcomes(newOutcomes);
try {
await Promise.all([
dbSaveState("pass-index", String(newIdx)),
dbSaveState("pass-outcomes", JSON.stringify(newOutcomes)),
]);
} catch(e) { console.error(e); }
}

title="Känsla · Sömn · Stress per pass"
series={[
{label:"Känsla 💪",color:C.accent,data:allWithFeeling.map(l=>({label:shortDate(l.date),val:(l.feeling??2)+1}))},
{label:"Sömn ★",color:C.pressText,data:allWithFeeling.map(l=>({label:shortDate(l.date),val:l.sleep||2}))},
{label:"Stress ▲",color:C.orange,data:allWithFeeling.map(l=>({label:shortDate(l.date),val:l.stress||2}))},
]}
/>
{/* Känsla vs ABC-prestation – bara om vi har matchade data */}
{(()=>{
const abcWithFeeling=abcSorted.filter(l=>l.feeling!=null);
if(abcWithFeeling.length<2) return null;
return (
<MultiLineChart
title="ABC-set vs Känsla (normaliserat)"
series={[
{label:"Set (÷2)",color:C.abcText,data:abcWithFeeling.map(l=>({label:shortDate(l.date),val:Math.round(Number(l.sets)/2)}))},
{label:"Känsla",color:C.accent,data:abcWithFeeling.map(l=>({label:shortDate(l.date),val:(l.feeling??2)+1}))},
]}
/>
);
})()}
</>
):<Empty text="Logga fler pass för att se välmående-trend"/>}

{/* ── PREHAB-SEKTION ── */}
{(()=>{
const withPrehab=allLogsSorted.filter(l=>l.prehabArms||l.prehabKnees);
if(withPrehab.length<2) return null;
// Prehab per vecka
const weekCounts={};
withPrehab.forEach(l=>{
const d=new Date(l.date+"T12:00:00");
const mon=new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
const wk=mon.toISOString().split("T")[0];
weekCounts[wk]=(weekCounts[wk]||0)+1;
});
const wkData=Object.entries(weekCounts).sort((a,b)=>a[0].localeCompare(b[0])).map(([wk,v])=>{
const d=new Date(wk+"T12:00:00");
return {label:`v${Math.ceil((d.getDate())/7)} ${["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"][d.getMonth()]}`,val:v};
});
return (
<>
<div style={{...labelStyle,fontSize:"0.65rem",paddingBottom:6,borderBottom:`1px solid ${C.border}`,marginTop:8}}>Prehab – Frekvens</div>
<BarChart title="Prehab-pass per vecka" data={wkData} color={C.accent} maxVal={6}/>
</>
);
})()}

{/* ── KROPPSLOGG ── */}
<div style={{...labelStyle,fontSize:"0.65rem",paddingBottom:6,borderBottom:`1px solid ${C.border}`,marginTop:8}}>Kroppslogg</div>
{logs.filter(l=>l.bodyLog).length===0?
<Empty text="Inga kroppsnoteringar ännu"/>:
<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",boxShadow:`0 1px 3px ${C.shadow}`}}>
{logs.filter(l=>l.bodyLog).map(l=>(
<div key={l.id} style={{marginBottom:10,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>
<span style={{fontSize:"0.62rem",color:C.muted}}>{formatDate(l.date)} · {l.type}</span>
<p style={{fontSize:"0.68rem",color:C.orange,marginTop:3,lineHeight:1.5}}>{l.bodyLog}</p>
</div>
))}
</div>
}

</div>
)}

{view==="settings"&&<SettingsView logs={logs} passIndex={passIndex} onImport={handleImport} goals={goals} onSaveGoals={saveGoals}/>}
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
