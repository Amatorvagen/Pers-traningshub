function passColor(type) {
  if (type==="Övergång") return {bg:C.surfaceAlt,border:C.border,text:C.muted};
  if (type==="Press")   return {bg:C.press,border:C.pressBorder,text:C.pressText};
  if (type==="ABC")     return {bg:C.abc,border:C.abcBorder,text:C.abcText};
  if (type==="WW")      return {bg:C.ww,border:C.wwBorder,text:C.wwText};
  if (type==="Annat")   return {bg:C.other,border:C.otherBorder,text:C.otherText};
  return {bg:C.surface,border:C.border,text:C.text};
}

function formatDate(d) {
  const days=["Sön","Mån","Tis","Ons","Tor","Fre","Lör"];
  const months=["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"];
  const date=new Date(d+"T12:00:00");
  return `${days[date.getDay()]} ${date.getDate()} ${months[date.getMonth()]}`;
}

async function dbLoadLogs() {
  const {data,error} = await sb.from("training_logs").select("*").order("date",{ascending:false});
  if (error) throw new Error("Fel vid hämtning av loggar: " + error.message);
  if (!data) return [];
  return data.map(r => {
    // Merge r.data (jsonb) with top-level id and date
    const entry = r.data || {};
    return {...entry, id: r.id, date: r.date};
  });
}
async function dbSaveLog(entry) {
  const {id, date, ...data} = entry;
  const {error} = await sb.from("training_logs").upsert({id, date, data:{...data,id,date}});
  if (error) throw error;
}
async function dbDeleteLog(id) {
  const {error} = await sb.from("training_logs").delete().eq("id",id);
  if (error) throw error;
}
async function dbLoadState(key) {
  const {data,error} = await sb.from("app_state").select("value").eq("key",key).single();
  if (error) return null;
  return data?.value || null;
}
async function dbSaveState(key, value) {
  const {error} = await sb.from("app_state").upsert({key, value});
  if (error) throw error;
}

// ── TIMER ──
function TimerView() {
  const [sets, setSets] = useState("20");
  const [secPerSet, setSecPerSet] = useState("90");
  // Timer state stored as wall-clock timestamps for background resilience
  const [phase, setPhase] = useState("idle"); // idle | running | paused | done
  const [currentSet, setCurrentSet] = useState(0);
  const [timeLeft, setTimeLeft] = useState(0);
  const [pauseLog, setPauseLog] = useState([]); // [{set, seconds}]
  const [totalPauseSeconds, setTotalPauseSeconds] = useState(0);

  // Wall-clock refs – survive background suspension
  const setEndRef = useRef(null);   // when current set ends (Date.now ms)
  const pauseStartRef = useRef(null); // when pause began
  const tickRef = useRef(null);
  const audioCtxRef = useRef(null);

  const totalSets = parseInt(sets) || 0;
  const sPerSet = parseInt(secPerSet) || 90;

  function getAudio() {
    if (!audioCtxRef.current)
      audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
    return audioCtxRef.current;
  }

  function beep(freq, dur, vol=0.4, delay=0) {
    try {
      const ctx = getAudio();
      const osc = ctx.createOscillator();
      const gain = ctx.createGain();
      osc.connect(gain); gain.connect(ctx.destination);
      osc.frequency.value = freq; osc.type = "sine";
      const t = ctx.currentTime + delay;
      gain.gain.setValueAtTime(vol, t);
      gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
      osc.start(t); osc.stop(t + dur);
    } catch(e) {}
  }

  function beepNewSet()  { beep(880, 0.15, 0.5); }
  function beepCount()   { beep(660, 0.08, 0.2); }
  function beepDone()    { beep(1046,0.15,0.5); beep(1318,0.15,0.5,0.2); beep(1568,0.25,0.5,0.4); }

  function startTick(endTime) {
    clearInterval(tickRef.current);
    tickRef.current = setInterval(() => {
      const left = Math.max(0, Math.round((endTime - Date.now()) / 1000));
      setTimeLeft(left);
      if (left === 3 || left === 2 || left === 1) beepCount();
      if (left === 0) {
        clearInterval(tickRef.current);
        // Advance set
        setCurrentSet(cs => {
          const next = cs + 1;
          if (next > totalSets) {
            setPhase("done");
            beepDone();
            return cs;
          }
          beepNewSet();
          const newEnd = Date.now() + sPerSet * 1000;
          setEndRef.current = newEnd;
          setTimeLeft(sPerSet);
          startTick(newEnd);
          return next;
        });
      }
    }, 500); // poll every 500ms – uses wall clock so background pause is fine
  }

  function start() {
    getAudio(); // unlock iOS audio on user gesture
    const endTime = Date.now() + sPerSet * 1000;
    setEndRef.current = endTime;
    setPhase("running");
    setCurrentSet(1);
    setTimeLeft(sPerSet);
    setPauseLog([]);
    setTotalPauseSeconds(0);
    beepNewSet();
    startTick(endTime);
  }

  function pause() {
    clearInterval(tickRef.current);
    pauseStartRef.current = Date.now();
    setPhase("paused");
  }

  function resume() {
    const pausedFor = Math.round((Date.now() - pauseStartRef.current) / 1000);
    setTotalPauseSeconds(p => p + pausedFor);
    setPauseLog(pl => {
      const entry = {set: currentSet, seconds: pausedFor};
      return [...pl, entry];
    });
    // Shift end time forward by how long we paused
    const newEnd = setEndRef.current + (Date.now() - pauseStartRef.current);
    setEndRef.current = newEnd;
    setPhase("running");
    startTick(newEnd);
  }

  function stop() {
    clearInterval(tickRef.current);
    setPhase("idle");
    setCurrentSet(0);
    setTimeLeft(0);
    setPauseLog([]);
    setTotalPauseSeconds(0);
  }

  useEffect(() => () => clearInterval(tickRef.current), []);

  const pct = phase === "running" ? ((sPerSet - timeLeft) / sPerSet) * 100 : 0;
  const radius = 80;
  const circ = 2 * Math.PI * radius;
  const strokeDash = circ - (pct / 100) * circ;
  const isLast3 = phase === "running" && timeLeft <= 3 && timeLeft > 0;
  const cardStyle = {background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 20px",marginBottom:14,boxShadow:`0 1px 3px ${C.shadow}`};

  function fmtSec(s) { return s < 60 ? `${s} sek` : `${Math.floor(s/60)} min ${s%60} sek`; }

  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      {phase === "idle" && (
        <div style={cardStyle}>
          <div style={labelStyle}>Timer</div>

            </div>
            <div style={{flex:1,minWidth:100}}>
              <label style={{display:"block",fontSize:"0.65rem",color:C.muted,marginBottom:6,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase"}}>Sek / set</label>
              <input type="number" value={secPerSet} onChange={e=>setSecPerSet(e.target.value)} style={{...IS,fontSize:"16px",width:"100%"}}/>
            </div>
          </div>
          <div style={{marginTop:10,fontSize:"0.65rem",color:C.faint}}>
            Total tid: {Math.floor(totalSets * sPerSet / 60)} min {(totalSets * sPerSet) % 60} sek
          </div>
        </div>
      )}

      <div style={{...cardStyle,textAlign:"center",padding:"28px 20px"}}>
        {phase === "done" ? (
          <div>
            <div style={{fontSize:"3rem",marginBottom:8}}>🎯</div>
            <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.4rem",fontWeight:800,color:C.accent,marginBottom:6}}>Klart!</div>
            <div style={{fontSize:"0.8rem",color:C.muted,marginBottom:4}}>{totalSets} set · {sPerSet} sek/set</div>
            {pauseLog.length > 0 && (
              <div style={{marginTop:10,background:C.bg,borderRadius:8,padding:"10px 14px",textAlign:"left"}}>
                <div style={{fontSize:"0.6rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.faint,marginBottom:6,fontWeight:600}}>Pauser</div>
                {pauseLog.map((p,i)=>(
                  <div key={i} style={{fontSize:"0.68rem",color:C.muted,marginBottom:3}}>Set {p.set}: {fmtSec(p.seconds)}</div>
                ))}
                <div style={{fontSize:"0.7rem",color:C.orange,marginTop:6,fontWeight:600}}>Totalt pausat: {fmtSec(totalPauseSeconds)}</div>
              </div>
            )}
          </div>
        ) : (phase === "running" || phase === "paused") ? (
          <div>
            <div style={{fontSize:"0.65rem",letterSpacing:"0.12em",textTransform:"uppercase",color:C.faint,marginBottom:12,fontWeight:600}}>
              Set {currentSet} av {totalSets}
              {phase === "paused" && <span style={{color:C.orange,marginLeft:8}}>· Pausad</span>}
            </div>
            <div style={{position:"relative",display:"inline-block",marginBottom:16}}>
              <svg width={200} height={200} style={{transform:"rotate(-90deg)"}}>
                <circle cx={100} cy={100} r={radius} fill="none" stroke={C.border} strokeWidth={10}/>
                <circle cx={100} cy={100} r={radius} fill="none"
                  stroke={phase==="paused"?C.orange:isLast3?C.orange:C.accent}
                  strokeWidth={10}
                  strokeDasharray={circ}
                  strokeDashoffset={phase==="paused"?strokeDash:strokeDash}
                  strokeLinecap="round"
                  style={{transition:"stroke-dashoffset 0.45s linear,stroke 0.3s"}}/>
              </svg>
              <div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
                <div style={{fontFamily:"'Syne',sans-serif",fontSize:"2.8rem",fontWeight:800,
                  color:phase==="paused"?C.orange:isLast3?C.orange:C.text,lineHeight:1,transition:"color 0.3s"}}>
                  {phase==="paused"?"⏸":timeLeft}
                </div>
                <div style={{fontSize:"0.6rem",color:C.faint,letterSpacing:"0.1em"}}>
                  {phase==="paused"?"pausad":"sekunder"}
                </div>
              </div>
            </div>
            {/* Progress dots */}
            <div style={{display:"flex",justifyContent:"center",flexWrap:"wrap",gap:5,maxWidth:300,margin:"0 auto 16px"}}>
              {Array.from({length:totalSets}).map((_,i)=>(
                <div key={i} style={{
                  width:10,height:10,borderRadius:"50%",
                  background:i<currentSet-1?C.accent:i===currentSet-1?C.accentMid:C.border,
                  transition:"background 0.3s",

            {pauseLog.length > 0 && (
              <div style={{fontSize:"0.62rem",color:C.orange,marginBottom:8}}>

          <div>

      <div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
        {phase === "idle" && (
          <button onClick={start} style={{background:C.accent,border:"none",color:"#fff",padding:"14px 40px",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1rem",touchAction:"manipulation"}}>

            </button>
            <button onClick={stop} style={{background:C.surface,border:`2px solid ${C.border2}`,color:C.muted,padding:"12px 24px",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.9rem",touchAction:"manipulation"}}>

            </button>

        )}
        {phase === "paused" && (
          <>

function SettingsView({logs,passIndex,onImport}) {
  const [importText,setImportText]=useState("");
  const [importStatus,setImportStatus]=useState(null);
  const [copied,setCopied]=useState(false);
  const [showBackup,setShowBackup]=useState(false);
  const backupText=JSON.stringify({logs,passIndex,exportedAt:new Date().toISOString()});

  function handleCopy() {
    navigator.clipboard.writeText(backupText).then(()=>{setCopied(true);setTimeout(()=>setCopied(false),2500);}).catch(()=>{
      const el=document.getElementById("backup-ta");
      if(el){el.select();document.execCommand("copy");}
      setCopied(true);setTimeout(()=>setCopied(false),2500);
    });
  }
  async function handleImport() {
    try {
      const data=JSON.parse(importText.trim());
      if(!data.logs) throw new Error("Ogiltig data");
      await onImport(data);
      setImportStatus(`✓ Återställt! ${data.logs.length} pass inlästa.`);
      setImportText("");
    } catch { setImportStatus("⚠️ Kunde inte läsa datan."); }
  }

  const cardStyle={background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"16px 18px",boxShadow:`0 1px 3px ${C.shadow}`};
  const btnStyle={background:C.bg,border:`1px solid ${C.border2}`,color:C.muted,padding:"8px 16px",borderRadius:6,cursor:"pointer",fontFamily:"inherit",fontSize:"0.8rem",touchAction:"manipulation"};
  return (
    <div style={{display:"flex",flexDirection:"column",gap:14}}>
      <div style={cardStyle}>
        <div style={labelStyle}>Säkerhetskopia</div>
        <p style={{fontSize:"0.7rem",color:C.muted,margin:"8px 0 12px",lineHeight:1.7}}>Backup om något går fel. Supabase är primär lagring.</p>
        <p style={{fontSize:"0.65rem",color:C.faint,marginBottom:10}}>{logs.length} pass · schemaindex {passIndex}</p>
        <button onClick={()=>setShowBackup(!showBackup)} style={{...btnStyle,marginBottom:showBackup?10:0}}>
          {showBackup?"Dölj text":"Visa backup-text"}
        </button>
        {showBackup && (
          <div style={{display:"flex",flexDirection:"column",gap:8,marginTop:8}}>
            <textarea id="backup-ta" readOnly value={backupText} rows={6} style={{...IS,fontSize:"12px",color:C.faint,resize:"none",fontFamily:"monospace"}}/>
            <button onClick={handleCopy} style={{background:copied?C.accent:C.bg,border:`1px solid ${copied?C.accent:C.border}`,color:copied?"#fff":C.muted,padding:"9px 18px",borderRadius:6,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.8rem",touchAction:"manipulation"}}>
              {copied?"✓ Kopierat!":"Kopiera till urklipp"}
            </button>
          </div>
        )}
      </div>
      <div style={cardStyle}>
        <div style={labelStyle}>Återställ från backup</div>
        <p style={{fontSize:"0.7rem",color:C.muted,margin:"8px 0 12px",lineHeight:1.7}}>Klistra in backup och tryck Återställ.</p>
        <textarea value={importText} onChange={e=>setImportText(e.target.value)} placeholder="Klistra in backup-text här..." rows={5} style={{...IS,fontSize:"16px",resize:"none",fontFamily:"monospace",marginBottom:10}}/>
        <button onClick={handleImport} disabled={!importText.trim()} style={{background:importText.trim()?C.accent:C.bg,border:`1px solid ${importText.trim()?C.accent:C.border}`,color:importText.trim()?"#fff":C.faint,padding:"9px 18px",borderRadius:6,cursor:importText.trim()?"pointer":"default",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.8rem",touchAction:"manipulation"}}>
          Återställ data
        </button>
        {importStatus && <p style={{fontSize:"0.7rem",color:C.accent,marginTop:10,fontWeight:600}}>{importStatus}</p>}
      </div>
      <div style={{background:C.accentLight,border:`1px solid ${C.accentMid}`,borderRadius:10,padding:"14px 16px"}}>
        <div style={{...labelStyle,color:C.accentMid}}>Lagring</div>
        <p style={{fontSize:"0.7rem",color:C.accent,marginTop:6,lineHeight:1.7}}>Data sparas i Supabase och synkar automatiskt. JSON-backup är extra säkerhet.</p>
      </div>
    </div>
  );
}

// ── WW FORM COMPONENT ──
const WW_STEPS = ["5+5","4+4","3+3","2+2","1+1"];

function WWForm({form, setForm}) {
  // Ensure at least one round
  const rounds = form.wwRounds && form.wwRounds.length > 0 ? form.wwRounds : [[]];

  function toggleStep(roundIdx, step) {
    const current = rounds[roundIdx] || [];
    const next = current.includes(step)
      ? current.filter(s=>s!==step)
      : [...current, step];
    const newRounds = rounds.map((r,i)=>i===roundIdx?next:r);
    setForm({...form, wwRounds: newRounds});
  }
  function addRound() {
    if (rounds.length >= 5) return;
    setForm({...form, wwRounds:[...rounds,[]]});
  }
  function removeRound(i) {
    const nr = rounds.filter((_,j)=>j!==i);
    setForm({...form, wwRounds: nr.length > 0 ? nr : [[]]});
  }

  return (
    <>
      <div style={{background:C.ww,border:`1px solid ${C.wwBorder}`,borderRadius:8,padding:"10px 12px",fontSize:"0.72rem",color:C.wwText,lineHeight:1.7}}>
        <strong>WW:</strong> 5+5 → 4+4 → 3+3 → 2+2 → 1+1 cleans+squats per rond.
      </div>
      <Row label="Vikt (kg)">
        <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
          {["12","16","20","24"].map(w=>(
            <button key={w} onClick={()=>setForm({...form,wwKg:w})} style={{
              background:form.wwKg===w?C.accentLight:C.bg,
              border:`2px solid ${form.wwKg===w?C.accent:C.border2}`,
              color:form.wwKg===w?C.accent:C.muted,
              padding:"7px 18px",borderRadius:6,cursor:"pointer",
              fontSize:"0.85rem",fontWeight:form.wwKg===w?700:500,touchAction:"manipulation",
            }}>{w} kg</button>
          ))}
        </div>
      </Row>
      <Row label="Ronder">
        <div style={{display:"flex",flexDirection:"column",gap:10}}>
          {rounds.map((round,ri)=>(
            <div key={ri} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px"}}>
              <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
                <span style={{fontSize:"0.72rem",color:C.muted,fontWeight:600}}>Rond {ri+1}</span>
                {rounds.length>1&&(
                  <button onClick={()=>removeRound(ri)} style={{background:"transparent",border:"none",color:C.faint,cursor:"pointer",fontSize:"0.8rem",touchAction:"manipulation"}}>✕</button>
                )}
              </div>
              <div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
                {WW_STEPS.map(step=>{
                  const done=round.includes(step);
                  return (
                    <button key={step} onClick={()=>toggleStep(ri,step)} style={{
                      background:done?C.accentLight:C.bg,
                      border:`2px solid ${done?C.accent:C.border2}`,
                      color:done?C.accent:C.muted,
                      padding:"6px 12px",borderRadius:6,cursor:"pointer",
                      fontSize:"0.78rem",fontWeight:done?700:500,touchAction:"manipulation",
                    }}>
                      {done?"✓ ":""}{step}
                    </button>
                  );
                })}
              </div>
              <div style={{marginTop:6,fontSize:"0.65rem",color:round.length===5?C.accent:C.faint}}>
                {round.length===5?"✓ Komplett rond":`${round.length}/5 steg`}
              </div>
            </div>
          ))}
          {rounds.length<5&&(
            <button onClick={addRound} style={{background:C.bg,border:`1px dashed ${C.border2}`,color:C.muted,padding:"8px",borderRadius:6,cursor:"pointer",fontSize:"0.7rem",letterSpacing:"0.1em",textTransform:"uppercase",touchAction:"manipulation"}}>
              + Lägg till rond
            </button>
          )}
        </div>
      </Row>
      <Row label="Anteckningar (valfritt)">
        <textarea value={form.wwNotes||""} onChange={e=>setForm({...form,wwNotes:e.target.value})} placeholder="Hur kändes det? Vad var svårt?" rows={2} style={{...IS,resize:"vertical"}}/>
      </Row>
    </>
  );
}

function App() {
  const [logs,setLogs]=useState([]);
  const [form,setForm]=useState(emptyForm);
  const [view,setView]=useState("home");
  const [saved,setSaved]=useState(false);
  const [loading,setLoading]=useState(true);
  const [dbError,setDbError]=useState(null);
  const [confirmId,setConfirmId]=useState(null);
  const [passIndex,setPassIndex]=useState(0);
  // passOutcomes: map of globalPassIndex -> "done" | "missed"
  const [passOutcomes,setPassOutcomes]=useState({});
  const [quote]=useState(()=>QUOTES[Math.floor(Math.random()*QUOTES.length)]);
  const draftTimerRef = useRef(null);

  useEffect(()=>{
    async function load() {
      try {
        const [fetchedLogs, idxVal, draftVal, outcomesVal] = await Promise.all([
          dbLoadLogs(),
          dbLoadState("pass-index"),
          dbLoadState(DRAFT_KEY),
          dbLoadState("pass-outcomes"),
        ]);
        setLogs(fetchedLogs);
        if (idxVal !== null) setPassIndex(Number(idxVal));
        if (draftVal) { try { setForm(JSON.parse(draftVal)); } catch(e) {} }
        if (outcomesVal) {
          try {
            const raw = JSON.parse(outcomesVal);
            const fixed = {};
            Object.entries(raw).forEach(([k,v]) => { fixed[Number(k)] = v; });
            setPassOutcomes(fixed);
          } catch(e) {}
        }
      } catch(e) {
        setDbError("Databasfel: " + e.message);
      }
      setLoading(false);
    }
    load();
  },[]);

  useEffect(() => {
    if (loading) return;
    clearTimeout(draftTimerRef.current);
    draftTimerRef.current = setTimeout(async () => {
      try { await dbSaveState(DRAFT_KEY, JSON.stringify(form)); } catch(e) {}
    }, 10000); // 10 seconds - generous debounce, app open 40 min 3x/week
    return () => clearTimeout(draftTimerRef.current);
  }, [form]);

  async function handleSubmit() {
    if (!form.date||!form.type) return;
    const entry={...form,id:Date.now()};
    try {
      await dbSaveLog(entry);
      const nl=[entry,...logs].sort((a,b)=>b.date.localeCompare(a.date));
      setLogs(nl);
      const fresh={...emptyForm,date:todayStr()};
      setForm(fresh);
      await dbSaveState(DRAFT_KEY, JSON.stringify(fresh));
      setSaved(true);
      setTimeout(()=>setSaved(false),2000);
      setView("history");
    } catch(e) { alert("Kunde inte spara passet: "+e.message); }
  }

  async function deleteLog(id) {
    try {
      await dbDeleteLog(id);
      setLogs(logs.filter(l=>l.id!==id));
    } catch(e) { alert("Kunde inte radera: "+e.message); }
  }

  // FIX: separate done vs missed
  async function advancePass(outcome) {
    const newOutcomes = {...passOutcomes, [passIndex]: outcome};
    setPassOutcomes(newOutcomes);
    const newIdx = passIndex + 1;
    setPassIndex(newIdx);
    try {
      await Promise.all([
        dbSaveState("pass-index", String(newIdx)),
        dbSaveState("pass-outcomes", JSON.stringify(newOutcomes)),
      ]);
    } catch(e) { console.error(e); }
  }

  async function undoAdvance() {
    if (passIndex === 0) return;
    const newIdx = passIndex - 1;
    const newOutcomes = {...passOutcomes};
    delete newOutcomes[newIdx];
    setPassIndex(newIdx);
    setPassOutcomes(newOutcomes);
    try {
      await Promise.all([
        dbSaveState("pass-index", String(newIdx)),
        dbSaveState("pass-outcomes", JSON.stringify(newOutcomes)),
      ]);
    } catch(e) { console.error(e); }
  }

  async function handleImport(data) {
    try {
      for (const entry of data.logs) { await dbSaveLog(entry); }
      const refreshed = await dbLoadLogs();
      setLogs(refreshed);
      if (typeof data.passIndex==="number") {
        setPassIndex(data.passIndex);
        await dbSaveState("pass-index", String(data.passIndex));
      }
    } catch(e) { alert("Import misslyckades: "+e.message); }
  }

  function updateStege(idx,col,field,val) {
    const steges=form.steges.map((s,i)=>i!==idx?s:{...s,[col]:{...s[col],[field]:val}});
    setForm({...form,steges});
  }

  const abcLogs=logs.filter(l=>l.type==="ABC"&&l.sets&&l.secPerSet);
  const pressLogs=logs.filter(l=>l.type==="Press"&&l.steges);
  const nextPass=ALL_PASSES[passIndex]||null;

  const NAV=[
    ["home","Hem"],["log","+ Logga"],["history","Historik"],["chart","Trend"],
    ["schedule","Schema"],["settings","⚙️"],
  ];

  const navBtnStyle = (v) => ({
    background:"transparent",border:"none",
    borderBottom:view===v?`2px solid ${C.navActive}`:"2px solid transparent",
    color:view===v?C.navActive:C.navText,
    padding:"8px 13px",cursor:"pointer",fontSize:"0.72rem",
    letterSpacing:"0.08em",textTransform:"uppercase",
    fontFamily:"inherit",whiteSpace:"nowrap",
    fontWeight:view===v?700:500,
    touchAction:"manipulation",
  });

  const cardStyle={background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",boxShadow:`0 1px 3px ${C.shadow}`};

  if (loading) return (
    <div style={{display:"flex",alignItems:"center",justifyContent:"center",height:"100vh",background:C.bg,fontFamily:"'DM Mono',monospace",color:C.muted,fontSize:"0.9rem"}}>
      Laddar…
    </div>
  );

  return (
    <div style={{background:C.bg,minHeight:"100vh",color:C.text,fontFamily:"'DM Mono','Courier New',monospace"}}>
      {dbError && (
        <div style={{background:"#fff0f0",borderBottom:"1px solid #f0b8b8",padding:"10px 20px",fontSize:"0.7rem",color:C.red,textAlign:"center"}}>
          ⚠️ {dbError}
        </div>
      )}

      {/* Header */}
      <div style={{background:C.surface,borderBottom:`1px solid ${C.border}`,padding:"18px 20px 0",boxShadow:`0 1px 4px ${C.shadow}`}}>
        <div style={{maxWidth:860,margin:"0 auto"}}>
          <h1 style={{fontFamily:"'Syne',sans-serif",fontSize:"1.5rem",fontWeight:800,letterSpacing:"-0.02em",color:C.text,marginBottom:14}}>
            Pers <span style={{color:C.accent}}>Träningshub</span>
          </h1>
          <div style={{display:"flex",overflowX:"auto",WebkitOverflowScrolling:"touch"}}>
            {NAV.map(([v,label])=>(
              <button key={v} onClick={()=>setView(v)} style={navBtnStyle(v)}>{label}</button>
            ))}
          </div>
        </div>
      </div>

      <div style={{maxWidth:860,margin:"0 auto",padding:"18px 20px 80px"}}>

        {/* ── HEM ── */}
        {view==="home"&&(()=>{
          const last=logs[0];
          const wwLogs=logs.filter(l=>l.type==="WW");
          return (
            <div style={{display:"flex",flexDirection:"column",gap:12,maxWidth:680}}>
              {/* Stats */}
              {logs.length>0&&(
                <div style={{display:"grid",gridTemplateColumns:"repeat(4,1fr)",gap:8}}>
                  {[["Pass",logs.length],["Press",pressLogs.length],["ABC",abcLogs.length],["WW",wwLogs.length]].map(([label,val])=>(
                    <div key={label} style={{background:C.surface,border:`1px solid ${C.border}`,padding:"9px 10px",borderRadius:8,boxShadow:`0 1px 2px ${C.shadow}`}}>
                      <div style={{fontSize:"0.52rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.faint,marginBottom:2}}>{label}</div>
                      <div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.2rem",fontWeight:700,color:C.accent}}>{val}</div>
                    </div>
                  ))}
                </div>
              )}
              <div style={cardStyle}>
                <div style={labelStyle}>Årsplan 2026</div>
                <div style={{display:"flex",flexWrap:"wrap",gap:6,marginTop:8}}>
                  {[{label:"ABF",period:"Mar–Maj",active:true},{label:"Giant 3.0",period:"Jun–Jul"},{label:"ABF",period:"Aug–Sep"},{label:"KCK",period:"Okt–Nov"},{label:"🎯 30 EMOM",period:"Dec"}].map((s,i)=>(
                    <div key={i} style={{background:s.active?C.accentLight:C.bg,border:`1px solid ${s.active?C.accent:C.border}`,borderRadius:6,padding:"5px 10px"}}>
                      <div style={{fontSize:"0.7rem",fontFamily:"'Syne',sans-serif",fontWeight:700,color:s.active?C.accent:C.muted}}>{s.label}</div>
                      <div style={{fontSize:"0.55rem",color:s.active?C.accentMid:C.faint,letterSpacing:"0.06em"}}>{s.period}</div>
                    </div>
                  ))}
                </div>
              </div>

              <div style={{background:C.accentLight,border:`1px solid ${C.accentMid}`,borderRadius:10,padding:"14px 16px"}}>
                <div style={{...labelStyle,color:C.accentMid}}>Nästa pass</div>
                {nextPass?(
                  <>
                    <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1rem",color:C.accent,margin:"6px 0 10px"}}>
                      {nextPass.type} · {nextPass.day} {nextPass.dateLabel}
                    </div>
                    <div style={{background:"rgba(255,255,255,0.6)",borderRadius:7,padding:"10px 12px",marginBottom:10}}>
                      {nextPass.weight&&(
                        <div style={{display:"flex",gap:8,alignItems:"baseline",marginBottom:5}}>
                          <span style={{fontSize:"0.6rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.accentMid,width:64,flexShrink:0,fontWeight:600}}>Vikt</span>
                          <span style={{fontSize:"0.72rem",color:C.accent,fontWeight:700}}>{nextPass.weight}</span>
                        </div>
                      )}
                      <div style={{display:"flex",gap:8,alignItems:"baseline",marginBottom:5}}>
                        <span style={{fontSize:"0.6rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.accentMid,width:64,flexShrink:0,fontWeight:600}}>Mål</span>
                        <span style={{fontSize:"0.72rem",color:C.text}}>{nextPass.detail}</span>
                      </div>
                      {nextPass.type==="Press"&&(
                        <div style={{display:"flex",gap:8,alignItems:"baseline"}}>
                          <span style={{fontSize:"0.6rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.accentMid,width:64,flexShrink:0,fontWeight:600}}>Stege</span>
                          <div style={{fontSize:"0.72rem",color:C.muted,lineHeight:1.9}}>
                            <div>2 reps @ 24 kg</div>
                            <div>3 reps @ 24 kg</div>
                            <div>5 reps @ 20 kg</div>
                          </div>
                        </div>
                      )}
                      {nextPass.type==="ABC"&&(
                        <div style={{display:"flex",gap:8,alignItems:"baseline"}}>
                          <span style={{fontSize:"0.6rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.accentMid,width:64,flexShrink:0,fontWeight:600}}>Rörelser</span>
                          <div style={{fontSize:"0.72rem",color:C.muted,lineHeight:1.9}}>
                            <div>2 cleans + 1 press + 3 squats</div>
                          </div>
                        </div>
                      )}
                    </div>
                    <p style={{fontSize:"0.68rem",color:C.accent,fontStyle:"italic",lineHeight:1.6,marginBottom:12}}>"{quote}"</p>
                    <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                      <button onClick={()=>setView("log")} style={{background:C.accent,border:"none",color:"#fff",padding:"10px 20px",borderRadius:7,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.8rem",touchAction:"manipulation"}}>Logga pass →</button>
                      <button onClick={()=>advancePass("done")} style={{background:"transparent",border:`2px solid ${C.accentMid}`,color:C.accent,padding:"8px 14px",borderRadius:7,cursor:"pointer",fontFamily:"inherit",fontSize:"0.7rem",fontWeight:600,touchAction:"manipulation"}}>Hoppa över</button>
                    </div>
                  </>
                ):(
                  <div style={{fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1rem",color:C.accent,margin:"6px 0 10px"}}>Alla pass klara! 🎯</div>
                )}
              </div>

              <div style={cardStyle}>
                <div style={labelStyle}>Senaste pass</div>
                {last?(
                  <div style={{marginTop:8}}>
                    <div style={{display:"flex",gap:8,alignItems:"center",marginBottom:4}}>
                      <span style={typeBadge(last.type)}>{last.type}</span>
                      <span style={{fontSize:"0.65rem",color:C.muted}}>{formatDate(last.date)}</span>
                      <span style={{fontSize:"0.9rem"}}>{FEELINGS[last.feeling]}</span>
                    </div>
                    {last.type==="Press"&&last.steges&&<p style={{fontSize:"0.68rem",color:C.muted}}>{last.steges.length} stegar · {totalPP(last)===0?"Inga push press 💪":`${totalPP(last)} push press`}</p>}
                    {last.type==="ABC"&&<p style={{fontSize:"0.68rem",color:C.muted}}>{last.sets} set @ {last.secPerSet} sek{last.pauses?.length>0?` · ${last.pauses.length} pauser`:""}{last.bonusSets&&Number(last.bonusSets)>0?` · +${last.bonusSets} bonus`:""}</p>}
                    {last.type==="WW"&&<p style={{fontSize:"0.68rem",color:C.muted}}>{last.wwRounds?.length||0} ronder · {last.wwKg||"?"}kg{last.wwRounds?.filter(r=>r.length===5).length>0?` · ${last.wwRounds.filter(r=>r.length===5).length} kompletta`:""}</p>}
                    {last.type==="Annat"&&<p style={{fontSize:"0.68rem",color:C.muted}}>{last.otherTitle||"Övrigt pass"}</p>}
                  </div>
                ):(
                  <p style={{fontSize:"0.68rem",color:C.faint,marginTop:8}}>Inga pass loggade ännu</p>
                )}
              </div>

              <div style={cardStyle}>
                <div style={labelStyle}>Kommande pass</div>
                <div style={{marginTop:8,display:"flex",flexDirection:"column",gap:7}}>
                  {ALL_PASSES.slice(passIndex,passIndex+5).map((p,i)=>{
                    const col=passColor(p.type);
                    return (
                      <div key={i} style={{display:"flex",alignItems:"center",gap:10}}>
                        <span style={{fontSize:"0.62rem",color:C.faint,minWidth:62}}>{p.day} {p.dateLabel}</span>
                        <span style={{fontSize:"0.65rem",background:col.bg,color:col.text,border:`1px solid ${col.border}`,padding:"3px 10px",borderRadius:5,fontWeight:700}}>{p.type}</span>
                        <span style={{fontSize:"0.58rem",color:C.faint}}>{p.weight}</span>
                      </div>
                    );
                  })}
                  <button onClick={()=>setView("schedule")} style={{background:"transparent",border:`1px solid ${C.border}`,color:C.muted,padding:"7px 14px",borderRadius:6,cursor:"pointer",fontSize:"0.65rem",fontFamily:"inherit",marginTop:2,alignSelf:"flex-start",touchAction:"manipulation"}}>Visa hela schemat →</button>
                </div>
              </div>
            </div>
          );
        })()}

        {/* ── SCHEMA ── */}
        {view==="schedule"&&(
          <div>
            <div style={{display:"flex",flexWrap:"wrap",gap:6,marginBottom:12}}>
              {[{color:C.press,border:C.pressBorder,label:"Press"},{color:C.abc,border:C.abcBorder,label:"ABC"},{color:C.missedBg,border:C.missedBorder,label:"Missat"},{color:C.surfaceAlt,border:C.border,label:"Klar"}].map(l=>(
                <div key={l.label} style={{display:"flex",alignItems:"center",gap:6,fontSize:"0.62rem",color:C.muted}}>
                  <div style={{width:10,height:10,borderRadius:2,background:l.color,border:`1px solid ${l.border}`}}/>
                  {l.label}
                </div>
              ))}
            </div>
            <div style={{background:C.accentLight,border:`1px solid ${C.accentMid}`,borderRadius:8,padding:"10px 14px",marginBottom:14,display:"flex",alignItems:"center",gap:8,flexWrap:"wrap"}}>
              <span style={{fontSize:"0.65rem",color:C.accent,fontWeight:700}}>Pass {Math.min(passIndex+1,ALL_PASSES.length)} av {ALL_PASSES.length}</span>
              <div style={{display:"flex",gap:6,marginLeft:"auto",flexWrap:"wrap"}}>
                {passIndex>0&&<button onClick={undoAdvance} style={{background:"transparent",border:`1px solid ${C.border2}`,color:C.muted,padding:"5px 12px",borderRadius:5,cursor:"pointer",fontSize:"0.65rem",fontFamily:"inherit",fontWeight:600,touchAction:"manipulation"}}>← Ångra</button>}
                {passIndex<ALL_PASSES.length&&<>
                  <button onClick={()=>advancePass("done")} style={{background:C.accent,border:"none",color:"#fff",padding:"5px 14px",borderRadius:5,cursor:"pointer",fontSize:"0.65rem",fontFamily:"inherit",fontWeight:700,touchAction:"manipulation"}}>✓ Klar</button>
                  <button onClick={()=>advancePass("missed")} style={{background:"transparent",border:`1px solid ${C.border2}`,color:C.muted,padding:"5px 12px",borderRadius:5,cursor:"pointer",fontSize:"0.65rem",fontFamily:"inherit",fontWeight:600,touchAction:"manipulation"}}>Missade</button>
                </>}
              </div>
            </div>
            {WEEK_SCHEDULE.map((week,wi)=>{
              let wsi=0;
              for(let i=0;i<wi;i++) wsi+=WEEK_SCHEDULE[i].passes.filter(Boolean).length;
              return (
                <div key={wi} style={{marginBottom:8}}>
                  {(wi===0||(week.passes[0]&&week.passes[0].date.includes("-05-")&&!WEEK_SCHEDULE[wi-1]?.passes[0]?.date.includes("-05-")))&&(
                    <div style={{fontSize:"0.72rem",fontFamily:"'Syne',sans-serif",fontWeight:700,letterSpacing:"0.2em",textTransform:"uppercase",color:C.muted,margin:wi===0?"0 0 10px 0":"18px 0 10px 0",paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>
                      {wi===0?"Mars / April 2026":"Maj 2026"}
                    </div>
                  )}
                  <div style={{display:"grid",gridTemplateColumns:"52px 1fr 1fr 1fr",gap:7}}>
                    <div style={{display:"flex",flexDirection:"column",justifyContent:"center",paddingTop:4}}>
                      <div style={{fontSize:"0.7rem",fontFamily:"'Syne',sans-serif",fontWeight:700,color:C.accent}}>{week.week}</div>
                      <div style={{fontSize:"0.55rem",color:C.faint,letterSpacing:"0.06em"}}>{week.phase}</div>
                    </div>
                    {[0,1,2].map(pi=>{
                      const p=week.passes[pi];
                      if(!p) return <div key={pi} style={{visibility:"hidden"}}/>;
                      const localIdx=week.passes.slice(0,pi).filter(Boolean).length;
                      const globalIdx=wsi+localIdx;
                      const done=globalIdx<passIndex;
                      const isCurrent=globalIdx===passIndex;
                      const outcome=passOutcomes[globalIdx]; // "done" | "missed" | undefined
                      const logged=logs.find(l=>l.date===p.date);
                      const wasAnnat=logged?.type==="Annat";
                      const col=passColor(p.type);

                      // Style based on outcome
                      let bg,border,textCol,dashed=false,opacity=1,label="";
                      if (!done) {
                        bg=col.bg; border=col.border; textCol=col.text;
                      } else if (outcome==="missed") {
                        bg=C.missedBg; border=C.missedBorder; textCol=C.missedText; dashed=true; opacity=0.65; label="missat";
                      } else {
                        // done/klar
                        bg=C.bg; border=C.border; textCol=C.faint; opacity=0.55;
                      }

                      return (
                        <div key={pi} style={{background:bg,border:`2px ${dashed?"dashed":"solid"} ${isCurrent?C.accent:border}`,borderRadius:7,padding:"9px 10px",minHeight:88,display:"flex",flexDirection:"column",gap:3,opacity,boxShadow:isCurrent?`0 0 0 3px ${C.accentLight}`:done?"none":`0 1px 3px ${C.shadow}`}}>
                          <div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
                            <span style={{fontSize:"0.52rem",letterSpacing:"0.08em",textTransform:"uppercase",color:done?C.faint:C.muted,fontWeight:600}}>{p.day}</span>
                            <span style={{fontSize:"0.52rem",color:done?C.faint:C.muted}}>{p.dateLabel}</span>
                          </div>
                          <div style={{fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.78rem",color:done?textCol:isCurrent?C.accent:textCol}}>
                            {wasAnnat?"Annat":p.type}
                            {done&&outcome==="done"?" ✓":""}
                            {done&&outcome==="missed"?" —":""}
                            {isCurrent?" ←":""}
                          </div>
                          <div style={{fontSize:"0.55rem",color:done?C.faint:C.accentMid,fontWeight:700}}>{p.weight}</div>
                          <div style={{fontSize:"0.58rem",color:done?C.faint:C.muted,lineHeight:1.5}}>{p.detail}</div>
                          {label&&<div style={{fontSize:"0.52rem",color:C.missedText,letterSpacing:"0.06em",textTransform:"uppercase"}}>{label}</div>}
                        </div>
                      );
                    })}
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {/* ── LOGGA ── */}
        {view==="log"&&(
          <div style={{display:"flex",flexDirection:"column",gap:18,maxWidth:680}}>
            <Row label="Datum">
              <input type="date" value={form.date} onChange={e=>setForm({...form,date:e.target.value})} style={IS}/>
            </Row>
            <Row label="Passtyp">
              <div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
                {["Press","ABC","WW","Annat"].map(t=>{
                  const col=passColor(t),sel=form.type===t;
                  return <button key={t} onClick={()=>setForm({...form,type:t,wwRounds:t==="WW"&&form.wwRounds.length===0?[[]]:form.wwRounds})} style={{background:sel?col.bg:C.bg,border:`2px solid ${sel?col.border:C.border2}`,color:sel?col.text:C.navText,padding:"8px 22px",borderRadius:7,cursor:"pointer",fontSize:"0.8rem",letterSpacing:"0.04em",fontFamily:"inherit",fontWeight:sel?700:500,touchAction:"manipulation"}}>{t}</button>;
                })}
              </div>
            </Row>

            {form.type==="Press"&&(
              <div style={{display:"flex",flexDirection:"column",gap:8}}>
                <label style={{fontSize:"0.65rem",letterSpacing:"0.12em",textTransform:"uppercase",color:C.muted,fontWeight:600}}>Stegar</label>
                <div style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr",gap:6}}>
                  <div/>
                  {["2 reps","3 reps","5 reps"].map(h=><div key={h} style={{fontSize:"0.55rem",letterSpacing:"0.08em",textTransform:"uppercase",color:C.faint,textAlign:"center",paddingBottom:4}}>{h}</div>)}
                </div>
                {form.steges.map((s,idx)=>(
                  <div key={idx} style={{display:"grid",gridTemplateColumns:"28px 1fr 1fr 1fr",gap:6,alignItems:"start"}}>
                    <div style={{display:"flex",flexDirection:"column",alignItems:"center",paddingTop:10,gap:4}}>
                      <span style={{fontSize:"0.65rem",color:C.muted}}>{idx+1}</span>
                      {form.steges.length>1&&<button onClick={()=>setForm({...form,steges:form.steges.filter((_,i)=>i!==idx)})} style={{background:"transparent",border:"none",color:C.faint,cursor:"pointer",fontSize:"0.75rem",padding:0,touchAction:"manipulation"}}>✕</button>}
                    </div>
                    <StegeCell kg={s.two.kg} pp={s.two.pp} maxReps={2} onKg={v=>updateStege(idx,"two","kg",v)} onPP={v=>updateStege(idx,"two","pp",v)}/>
                    <StegeCell kg={s.three.kg} pp={s.three.pp} maxReps={3} onKg={v=>updateStege(idx,"three","kg",v)} onPP={v=>updateStege(idx,"three","pp",v)}/>
                    <StegeCell kg={s.five.kg} pp={s.five.pp} split={s.five.split} maxReps={5} showSplit onKg={v=>updateStege(idx,"five","kg",v)} onPP={v=>updateStege(idx,"five","pp",v)} onSplit={v=>updateStege(idx,"five","split",v)}/>
                  </div>
                ))}
                <button onClick={()=>setForm({...form,steges:[...form.steges,emptyStege()]})} style={{background:C.bg,border:`1px dashed ${C.border2}`,color:C.muted,padding:"8px",borderRadius:6,cursor:"pointer",fontSize:"0.65rem",letterSpacing:"0.1em",fontFamily:"inherit",textTransform:"uppercase",touchAction:"manipulation"}}>+ Lägg till stege</button>
              </div>
            )}

            {form.type==="ABC"&&(
              <>
                <Row label="Set @ 24 kg"><input type="number" placeholder="t.ex. 12" value={form.sets} onChange={e=>setForm({...form,sets:e.target.value})} style={{...IS,width:140}}/></Row>
                <Row label="Sek / set"><input type="number" placeholder="t.ex. 88" value={form.secPerSet} onChange={e=>setForm({...form,secPerSet:e.target.value})} style={{...IS,width:140}}/></Row>
                <Row label="Bonusset @ 20 kg (valfritt)"><input type="number" placeholder="0" value={form.bonusSets} onChange={e=>setForm({...form,bonusSets:e.target.value})} style={{...IS,width:90}}/></Row>
                <Row label="Pauser">
                  <div style={{display:"flex",flexDirection:"column",gap:6}}>
                    {form.pauses.map((p,i)=>(
                      <div key={i} style={{display:"flex",alignItems:"center",gap:8}}>
                        <span style={{fontSize:"0.65rem",color:C.muted,whiteSpace:"nowrap"}}>Set kvar:</span>
                        <input type="number" placeholder="19" value={p.setsLeft} onChange={e=>{const ps=form.pauses.map((x,j)=>j===i?{...x,setsLeft:e.target.value}:x);setForm({...form,pauses:ps});}} style={{...IS,width:70}}/>
                        <span style={{fontSize:"0.65rem",color:C.muted,whiteSpace:"nowrap"}}>Vila (min):</span>
                        <input type="number" placeholder="2" value={p.minutes} onChange={e=>{const ps=form.pauses.map((x,j)=>j===i?{...x,minutes:e.target.value}:x);setForm({...form,pauses:ps});}} style={{...IS,width:60}}/>
                        <button onClick={()=>setForm({...form,pauses:form.pauses.filter((_,j)=>j!==i)})} style={{background:"transparent",border:"none",color:C.faint,cursor:"pointer",fontSize:"0.8rem",padding:"0 4px",touchAction:"manipulation"}}>✕</button>
                      </div>
                    ))}
                    <button onClick={()=>setForm({...form,pauses:[...form.pauses,{setsLeft:"",minutes:""}]})} style={{background:C.bg,border:`1px dashed ${C.border2}`,color:C.muted,padding:"7px",borderRadius:6,cursor:"pointer",fontSize:"0.65rem",letterSpacing:"0.1em",fontFamily:"inherit",textTransform:"uppercase",alignSelf:"flex-start",touchAction:"manipulation"}}>+ Lägg till paus</button>
                  </div>
                </Row>
              </>
            )}

            {form.type==="Annat"&&(
              <>
                <Row label="Vad körde du?"><input type="text" placeholder="t.ex. Löpning, yoga, promenad..." value={form.otherTitle} onChange={e=>setForm({...form,otherTitle:e.target.value})} style={IS}/></Row>
                <Row label="Anteckningar (valfritt)"><textarea value={form.otherNotes} onChange={e=>setForm({...form,otherNotes:e.target.value})} placeholder="Hur gick det? Hur länge?" rows={3} style={{...IS,resize:"vertical"}}/></Row>
              </>
            )}

            {form.type==="WW"&&(
              <WWForm form={form} setForm={setForm} C={C} IS={IS} />
            )}

            <Row label="Känsla">
              <div style={{display:"flex",gap:8}}>
                {FEELINGS.map((f,i)=>(
                  <button key={i} onClick={()=>setForm({...form,feeling:i})} style={{background:form.feeling===i?C.accentLight:C.bg,border:`2px solid ${form.feeling===i?C.accent:C.border}`,borderRadius:7,padding:"7px 11px",cursor:"pointer",fontSize:"1.1rem",opacity:form.feeling===i?1:0.35,touchAction:"manipulation"}} title={FEELING_LABELS[i]}>{f}</button>
                ))}
              </div>
            </Row>
            <Row label="Sömn"><Slider value={form.sleep} onChange={v=>setForm({...form,sleep:v})} labels={["Dålig","","Ok","","Bra"]} accent={C.accent}/></Row>
            <Row label="Stress"><Slider value={form.stress} onChange={v=>setForm({...form,stress:v})} labels={["Låg","","Medel","","Hög"]} accent={C.orange}/></Row>

            <Row label="Prehab">
              <div style={{display:"flex",gap:10}}>
                {[["prehabArms","💪 Armar"],["prehabKnees","🦵 Knän"]].map(([key,label])=>(
                  <button key={key} onClick={()=>setForm({...form,[key]:!form[key]})} style={{background:form[key]?C.accentLight:C.bg,border:`2px solid ${form[key]?C.accent:C.border2}`,color:form[key]?C.accent:C.navText,padding:"10px 18px",borderRadius:8,cursor:"pointer",fontSize:"0.85rem",fontFamily:"inherit",fontWeight:form[key]?700:500,display:"flex",alignItems:"center",gap:6,touchAction:"manipulation"}}>
                    <span style={{width:16,height:16,borderRadius:3,background:form[key]?C.accent:C.surface,border:`2px solid ${form[key]?C.accent:C.border2}`,display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
                      {form[key]&&<span style={{color:"#fff",fontSize:"0.65rem",lineHeight:1}}>✓</span>}
                    </span>
                    {label}
                  </button>
                ))}
              </div>
            </Row>

            <Row label="Kropp — besvär eller notering"><textarea value={form.bodyLog} onChange={e=>setForm({...form,bodyLog:e.target.value})} placeholder="t.ex. revbenen ok, ingenting..." rows={2} style={{...IS,resize:"vertical"}}/></Row>
            <Row label="Anteckningar"><textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Fritext..." rows={2} style={{...IS,resize:"vertical"}}/></Row>

            <button onClick={handleSubmit} style={{background:C.accent,border:"none",color:"#fff",padding:"14px 28px",borderRadius:9,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"1rem",letterSpacing:"0.04em",marginTop:4,touchAction:"manipulation"}}>
              {saved?"✓ Sparat!":"Spara pass"}
            </button>
          </div>
        )}

        {/* ── HISTORIK ── */}
        {view==="history"&&(
          <div>
            {dbError&&<div style={{background:"#fff0f0",border:"1px solid #f0b8b8",borderRadius:8,padding:"10px 14px",marginBottom:10,fontSize:"0.7rem",color:C.red}}>⚠️ {dbError}</div>}
            {!loading&&logs.length===0&&!dbError&&(
              <div style={{background:"#fff8e8",border:"1px solid #e8d898",borderRadius:8,padding:"12px 14px",marginBottom:10,fontSize:"0.7rem",color:"#806000",lineHeight:1.7}}>
                ⚠️ Inga pass i databasen. Kontrollera i Supabase → Table Editor → training_logs att tabellen finns och att RLS-policyn "Allow all" är aktiv. Prova också att logga ett nytt testpass.
              </div>
            )}
            <div className="history-card-mobile">
              {loading&&<p style={{color:C.muted,fontSize:"0.75rem"}}>Laddar...</p>}
              {logs.map(l=><LogCard key={l.id} l={l} confirmId={confirmId} setConfirmId={setConfirmId} deleteLog={deleteLog}/>)}
            </div>
            <div className="history-card-desktop">
              {loading&&<p style={{color:C.muted,fontSize:"0.75rem"}}>Laddar...</p>}
              {WEEK_SCHEDULE.map((week,wi)=>{
                const hasAny = week.passes.filter(Boolean).some(p=>logs.find(l=>l.date===p.date));
                if (!hasAny) return null;
                return (
                  <div key={wi} className="history-week-row">
                    <div style={{display:"flex",flexDirection:"column",paddingTop:6}}>
                      <div style={{fontSize:"0.7rem",fontFamily:"'Syne',sans-serif",fontWeight:700,color:C.accent}}>{week.week}</div>
                      <div style={{fontSize:"0.55rem",color:C.faint}}>{week.phase}</div>
                    </div>
                    {[0,1,2].map(pi=>{
                      const p=week.passes[pi];
                      if(!p) return <div key={pi} style={{visibility:"hidden"}}/>;
                      const logged=logs.find(l=>l.date===p.date);
                      return <LogCardCompact key={pi} l={logged||null} confirmId={confirmId} setConfirmId={setConfirmId} deleteLog={deleteLog}/>;
                    })}
                  </div>
                );
              })}
            </div>
          </div>
        )}

        {/* ── TREND ── */}
        {view==="chart"&&(
          <div style={{display:"flex",flexDirection:"column",gap:20,maxWidth:680}}>
            {abcLogs.length>1?<ChartBlock title="ABC — Set per pass" data={[...abcLogs].reverse().map(l=>({label:formatDate(l.date).slice(4),val:Number(l.sets)}))} color={C.abcText} max={30} target={23}/>:<Empty text="Logga minst 2 ABC-pass för att se trend"/>}
            {abcLogs.length>1&&<ChartBlock title="ABC — Sek / set" data={[...abcLogs].reverse().map(l=>({label:formatDate(l.date).slice(4),val:Number(l.secPerSet)}))} color={C.accent} max={95} target={75}/>}
            {pressLogs.length>1?<ChartBlock title="Press — Push press per pass" data={[...pressLogs].reverse().map(l=>({label:formatDate(l.date).slice(4),val:totalPP(l)}))} color={C.orange} max={20} target={0}/>:<Empty text="Logga minst 2 press-pass för att se PP-trend"/>}
            <div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",boxShadow:`0 1px 3px ${C.shadow}`}}>
              <div style={labelStyle}>Kroppslogg</div>
              {logs.filter(l=>l.bodyLog).length===0?<p style={{fontSize:"0.7rem",color:C.faint,marginTop:8}}>Inga noteringar ännu</p>:logs.filter(l=>l.bodyLog).map(l=>(
                <div key={l.id} style={{marginTop:10,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>
                  <span style={{fontSize:"0.62rem",color:C.muted}}>{formatDate(l.date)} · {l.type}</span>
                  <p style={{fontSize:"0.68rem",color:C.orange,marginTop:3,lineHeight:1.5}}>{l.bodyLog}</p>
                </div>
              ))}
            </div>
          </div>
        )}

        {view==="settings"&&<SettingsView logs={logs} passIndex={passIndex} onImport={handleImport}/>}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
</body>
</html>
