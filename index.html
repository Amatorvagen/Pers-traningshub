async function dbLoadLogs() {
const {data,error} = await sb.from("training_logs").select("*").order("date",{ascending:false});
if (error) throw new Error("Fel vid hämtning av loggar: " + error.message);
if (!data) return [];
return data.map(r => {
const entry = r.data || {};
return {...entry, id: r.id, date: r.date};
});
}
async function dbSaveLog(entry) {
const {id, date, ...data} = entry;
const {error} = await sb.from("training_logs").upsert({id, date, data:{...data,id,date}},{onConflict:"id"});
if (error) throw error;
}
async function dbDeleteLog(id) {
const {error} = await sb.from("training_logs").delete().eq("id",id);
if (error) throw error;
}
async function dbLoadState(key) {
const {data,error} = await sb.from("app_state").select("value").eq("key",key).single();
if (error) return null;
return data?.value || null;
}
async function dbSaveState(key, value) {
const {error} = await sb.from("app_state").upsert({key, value});
if (error) throw error;
}

function RepCell({label, kg, pp, done, maxReps, split, showSplit, onKg, onPP, onDone, onSplit}) {
const {useState:us, useEffect:ue, useRef:ur} = React;
const [localDone, setLocalDone] = us(done||false);
const [localPP, setLocalPP] = us(pp||0);
const timerRef = ur(null);
const LOCK_DELAY = 3000; // 3 sekunder inaktivitet → låser cellen

// Synka utifrån om cellen redigeras externt (t.ex. vid edit av gammalt pass)
ue(()=>{ setLocalDone(done||false); },[done]);
ue(()=>{ setLocalPP(pp||0); },[pp]);

function resetTimer() {
clearTimeout(timerRef.current);
timerRef.current = setTimeout(()=>{
// Lås cellen efter inaktivitet – anropa parent med aktuell state
onDone(true, localPP);
setLocalDone(true);
}, LOCK_DELAY);
}

function handleDone() {
setLocalDone(true);
onDone(true, localPP);
clearTimeout(timerRef.current);
}

function handleUndo() {
setLocalDone(false);
setLocalPP(0);
onDone(false, 0);
clearTimeout(timerRef.current);
}

function handlePP(newPP) {
const clamped = Math.max(0, Math.min(maxReps, newPP));
setLocalPP(clamped);
onPP(clamped);
if (!localDone) resetTimer();
}

ue(()=>()=>clearTimeout(timerRef.current), []);

const clean = maxReps - localPP;
const hasActivity = localDone || localPP > 0;
const isClean = localPP === 0 && !split;
const WEIGHTS = ["16","20","24"];

// Färger baserat på state
let bg, border;
if (!hasActivity) { bg=C.surface; border=C.border; }
else if (localPP > 0) { bg=C.orangeBg; border=C.orangeBorder; }
else { bg="#f4f8ee"; border=C.abcBorder; }

return (
<div style={{border:`1px solid ${border}`,borderRadius:7,padding:"7px 8px",background:bg,display:"flex",flexDirection:"column",gap:5,transition:"background 0.2s,border-color 0.2s"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center"}}>
<div style={{fontSize:"0.52rem",color:C.faint,letterSpacing:"0.08em",textTransform:"uppercase",fontWeight:600}}>{label}</div>
{localDone&&<button onClick={handleUndo} style={{background:"transparent",border:"none",color:C.faint,cursor:"pointer",fontSize:"0.6rem",padding:0,touchAction:"manipulation",letterSpacing:"0.04em"}}>ångra</button>}
</div>
<div style={{display:"flex",gap:3}}>
{WEIGHTS.map(w=>(
<button key={w} onClick={()=>onKg(w)} style={{
flex:1,background:kg===w?C.accentLight:C.bg,
border:`1px solid ${kg===w?C.accent:C.border}`,
color:kg===w?C.accent:C.muted,
padding:"4px 0",borderRadius:3,cursor:"pointer",
fontSize:"0.62rem",fontFamily:"inherit",fontWeight:kg===w?700:400,
touchAction:"manipulation",
}}>{w}</button>
))}
</div>
{split ? (
<div style={{fontSize:"0.62rem",color:C.pressText,fontWeight:600}}>{split}</div>
) : localDone ? (
<div style={{display:"flex",alignItems:"center",justifyContent:"space-between",gap:4}}>
<span style={{fontSize:"0.72rem",fontWeight:700,color:localPP>0?C.orange:C.abcText}}>
{localPP>0?`${clean}✓ ${localPP}PP`:`${maxReps}×${kg}✓`}
</span>
<div style={{display:"flex",gap:3}}>
<button onClick={()=>handlePP(localPP-1)} style={{background:C.bg,border:`1px solid ${C.border2}`,color:C.muted,width:34,height:34,borderRadius:6,cursor:"pointer",fontSize:"1.2rem",fontFamily:"inherit",padding:0,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation"}}>−</button>
<button onClick={()=>handlePP(localPP+1)} style={{background:C.orangeBg,border:`1px solid ${C.orangeBorder}`,color:C.orange,width:34,height:34,borderRadius:6,cursor:"pointer",fontSize:"0.65rem",fontFamily:"inherit",padding:0,display:"flex",alignItems:"center",justifyContent:"center",touchAction:"manipulation",fontWeight:700}}>+PP</button>
</div>
</div>
) : (
<div style={{display:"flex",gap:4}}>
<button onClick={handleDone} style={{
flex:1,background:C.bg,border:`1px dashed ${C.border2}`,
color:C.muted,padding:"7px 4px",borderRadius:6,cursor:"pointer",
fontSize:"0.65rem",fontFamily:"inherit",fontWeight:600,
touchAction:"manipulation",letterSpacing:"0.04em",
}}>✓ Klart</button>
<button onClick={()=>handlePP(localPP+1)} style={{
background:C.orangeBg,border:`1px solid ${C.orangeBorder}`,
color:C.orange,padding:"7px 8px",borderRadius:6,cursor:"pointer",
fontSize:"0.65rem",fontFamily:"inherit",fontWeight:700,
touchAction:"manipulation",
}}>+PP</button>
</div>
)}
{showSplit && (

placeholder={split?"":"dela? t.ex. 6×20+4×16"}
value={split||""}
onChange={e=>onSplit(e.target.value)}
style={{...IS,fontSize:"0.6rem",padding:"3px 6px",borderRadius:4}}
/>
)}
</div>
);

// ── TIMER ──
function TimerView() {
const [sets, setSets] = useState("20");
const [secPerSet, setSecPerSet] = useState("90");
const [phase, setPhase] = useState("idle");
const [currentSet, setCurrentSet] = useState(0);
const [timeLeft, setTimeLeft] = useState(0);
const [pauseLog, setPauseLog] = useState([]);
const [totalPauseSeconds, setTotalPauseSeconds] = useState(0);

const setEndRef = useRef(null);
const pauseStartRef = useRef(null);
const tickRef = useRef(null);
const audioCtxRef = useRef(null);

const totalSets = parseInt(sets) || 0;
const sPerSet = parseInt(secPerSet) || 90;

function getAudio() {
if (!audioCtxRef.current)
audioCtxRef.current = new (window.AudioContext || window.webkitAudioContext)();
return audioCtxRef.current;
}

function beep(freq, dur, vol=0.4, delay=0) {
try {
const ctx = getAudio();
const osc = ctx.createOscillator();
const gain = ctx.createGain();
osc.connect(gain); gain.connect(ctx.destination);
osc.frequency.value = freq; osc.type = "sine";
const t = ctx.currentTime + delay;
gain.gain.setValueAtTime(vol, t);
gain.gain.exponentialRampToValueAtTime(0.001, t + dur);
osc.start(t); osc.stop(t + dur);
} catch(e) {}
}

function beepNewSet()  { beep(880, 0.15, 0.5); }
function beepCount()   { beep(660, 0.08, 0.2); }
function beepDone()    { beep(1046,0.15,0.5); beep(1318,0.15,0.5,0.2); beep(1568,0.25,0.5,0.4); }

function startTick(endTime) {
clearInterval(tickRef.current);
tickRef.current = setInterval(() => {
const left = Math.max(0, Math.round((endTime - Date.now()) / 1000));
setTimeLeft(left);
if (left === 3 || left === 2 || left === 1) beepCount();
if (left === 0) {
clearInterval(tickRef.current);
setCurrentSet(cs => {
const next = cs + 1;
if (next > totalSets) {
setPhase("done");
beepDone();
return cs;
}
beepNewSet();
const newEnd = Date.now() + sPerSet * 1000;
setEndRef.current = newEnd;
setTimeLeft(sPerSet);
startTick(newEnd);
return next;
});
}
}, 500);
}

function start() {
getAudio();
const endTime = Date.now() + sPerSet * 1000;
setEndRef.current = endTime;
setPhase("running");
setCurrentSet(1);
setTimeLeft(sPerSet);
setPauseLog([]);
setTotalPauseSeconds(0);
beepNewSet();
startTick(endTime);
}

function pause() {
clearInterval(tickRef.current);
pauseStartRef.current = Date.now();
setPhase("paused");
}

function resume() {
const pausedFor = Math.round((Date.now() - pauseStartRef.current) / 1000);
setTotalPauseSeconds(p => p + pausedFor);
setPauseLog(pl => {
const entry = {set: currentSet, seconds: pausedFor};
return [...pl, entry];
});
const newEnd = setEndRef.current + (Date.now() - pauseStartRef.current);
setEndRef.current = newEnd;
setPhase("running");
startTick(newEnd);
}

function stop() {
clearInterval(tickRef.current);
setPhase("idle");
setCurrentSet(0);
setTimeLeft(0);
setPauseLog([]);
setTotalPauseSeconds(0);
}

useEffect(() => () => clearInterval(tickRef.current), []);

const pct = phase === "running" ? ((sPerSet - timeLeft) / sPerSet) * 100 : 0;
const radius = 80;
const circ = 2 * Math.PI * radius;
const strokeDash = circ - (pct / 100) * circ;
const isLast3 = phase === "running" && timeLeft <= 3 && timeLeft > 0;
const cardStyle = {background:C.surface,border:`1px solid ${C.border}`,borderRadius:12,padding:"18px 20px",marginBottom:14,boxShadow:`0 1px 3px ${C.shadow}`};

function fmtSec(s) { return s < 60 ? `${s} sek` : `${Math.floor(s/60)} min ${s%60} sek`; }

return (
<div style={{display:"flex",flexDirection:"column",gap:14}}>
{phase === "idle" && (
<div style={cardStyle}>
<div style={labelStyle}>Timer</div>
<div style={{display:"flex",gap:16,marginTop:12,flexWrap:"wrap"}}>
<div style={{flex:1,minWidth:100}}>
<label style={{display:"block",fontSize:"0.65rem",color:C.muted,marginBottom:6,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase"}}>Antal set</label>
<input type="number" value={sets} onChange={e=>setSets(e.target.value)} style={{...IS,fontSize:"16px",width:"100%"}}/>
</div>
<div style={{flex:1,minWidth:100}}>
<label style={{display:"block",fontSize:"0.65rem",color:C.muted,marginBottom:6,fontWeight:600,letterSpacing:"0.1em",textTransform:"uppercase"}}>Sek / set</label>
<input type="number" value={secPerSet} onChange={e=>setSecPerSet(e.target.value)} style={{...IS,fontSize:"16px",width:"100%"}}/>
</div>
</div>
<div style={{marginTop:10,fontSize:"0.65rem",color:C.faint}}>
Total tid: {Math.floor(totalSets * sPerSet / 60)} min {(totalSets * sPerSet) % 60} sek
</div>
</div>
)}

<div style={{...cardStyle,textAlign:"center",padding:"28px 20px"}}>
{phase === "done" ? (
<div>
<div style={{fontSize:"3rem",marginBottom:8}}>🎯</div>
<div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.4rem",fontWeight:800,color:C.accent,marginBottom:6}}>Klart!</div>
<div style={{fontSize:"0.8rem",color:C.muted,marginBottom:4}}>{totalSets} set · {sPerSet} sek/set</div>
{pauseLog.length > 0 && (
<div style={{marginTop:10,background:C.bg,borderRadius:8,padding:"10px 14px",textAlign:"left"}}>
<div style={{fontSize:"0.6rem",letterSpacing:"0.1em",textTransform:"uppercase",color:C.faint,marginBottom:6,fontWeight:600}}>Pauser</div>
{pauseLog.map((p,i)=>(
<div key={i} style={{fontSize:"0.68rem",color:C.muted,marginBottom:3}}>Set {p.set}: {fmtSec(p.seconds)}</div>
))}
<div style={{fontSize:"0.7rem",color:C.orange,marginTop:6,fontWeight:600}}>Totalt pausat: {fmtSec(totalPauseSeconds)}</div>
</div>
)}
</div>
) : (phase === "running" || phase === "paused") ? (
<div>
<div style={{fontSize:"0.65rem",letterSpacing:"0.12em",textTransform:"uppercase",color:C.faint,marginBottom:12,fontWeight:600}}>
Set {currentSet} av {totalSets}
{phase === "paused" && <span style={{color:C.orange,marginLeft:8}}>· Pausad</span>}
</div>
<div style={{position:"relative",display:"inline-block",marginBottom:16}}>
<svg width={200} height={200} style={{transform:"rotate(-90deg)"}}>
<circle cx={100} cy={100} r={radius} fill="none" stroke={C.border} strokeWidth={10}/>
<circle cx={100} cy={100} r={radius} fill="none"
stroke={phase==="paused"?C.orange:isLast3?C.orange:C.accent}
strokeWidth={10}
strokeDasharray={circ}
strokeDashoffset={strokeDash}
strokeLinecap="round"
style={{transition:"stroke-dashoffset 0.45s linear,stroke 0.3s"}}/>
</svg>
<div style={{position:"absolute",top:"50%",left:"50%",transform:"translate(-50%,-50%)",textAlign:"center"}}>
<div style={{fontFamily:"'Syne',sans-serif",fontSize:"2.8rem",fontWeight:800,
color:phase==="paused"?C.orange:isLast3?C.orange:C.text,lineHeight:1,transition:"color 0.3s"}}>
{phase==="paused"?"⏸":timeLeft}
</div>
<div style={{fontSize:"0.6rem",color:C.faint,letterSpacing:"0.1em"}}>
{phase==="paused"?"pausad":"sekunder"}
</div>
</div>
</div>
<div style={{display:"flex",justifyContent:"center",flexWrap:"wrap",gap:5,maxWidth:300,margin:"0 auto 16px"}}>
{Array.from({length:totalSets}).map((_,i)=>(
<div key={i} style={{
width:10,height:10,borderRadius:"50%",
background:i<currentSet-1?C.accent:i===currentSet-1?C.accentMid:C.border,
transition:"background 0.3s",
}}/>
))}
</div>
{pauseLog.length > 0 && (
<div style={{fontSize:"0.62rem",color:C.orange,marginBottom:8}}>
{pauseLog.length} paus{pauseLog.length>1?"er":""} · {fmtSec(totalPauseSeconds)} totalt
</div>
)}
</div>
) : (
<div>
<div style={{fontFamily:"'Syne',sans-serif",fontSize:"1.1rem",fontWeight:800,color:C.text,marginBottom:4}}>
{totalSets} set · {sPerSet} sek
</div>
<div style={{fontSize:"0.7rem",color:C.faint}}>Tryck Start för att börja</div>
</div>
)}
</div>

<div style={{display:"flex",gap:10,justifyContent:"center",flexWrap:"wrap"}}>
{phase === "idle" && (
<button onClick={start} style={{background:C.accent,border:"none",color:"#fff",padding:"14px 40px",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1rem",touchAction:"manipulation"}}>
Start
</button>
)}
{phase === "running" && (
<>
<button onClick={pause} style={{background:C.orangeBg,border:`2px solid ${C.orangeBorder}`,color:C.orange,padding:"12px 28px",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.9rem",touchAction:"manipulation"}}>
Pausa
</button>
<button onClick={stop} style={{background:C.surface,border:`2px solid ${C.border2}`,color:C.muted,padding:"12px 24px",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.9rem",touchAction:"manipulation"}}>
Avbryt
</button>
</>
)}
{phase === "paused" && (
<>
<button onClick={resume} style={{background:C.accent,border:"none",color:"#fff",padding:"14px 32px",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1rem",touchAction:"manipulation"}}>
Fortsätt
</button>
<button onClick={stop} style={{background:C.surface,border:`2px solid ${C.border2}`,color:C.muted,padding:"12px 24px",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"0.9rem",touchAction:"manipulation"}}>
Avbryt
</button>
</>
)}
{phase === "done" && (
<button onClick={stop} style={{background:C.accent,border:"none",color:"#fff",padding:"14px 40px",borderRadius:10,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:800,fontSize:"1rem",touchAction:"manipulation"}}>

// ── CLAUDE SUMMARY EXPORT ──
function ClaudeSummary({logs, goals, passIndex}) {
const [copied, setCopied] = useState(false);

function buildSummary() {
const today = new Date();
const allLogs = [...logs].sort((a,b) => a.date.localeCompare(b.date));

const abcLogs = logs.filter(l=>l.type==="ABC"&&l.sets);
const pressLogs = logs.filter(l=>l.type==="Press"&&l.steges);
const wwLogs = logs.filter(l=>l.type==="WW");

const bestABC = abcLogs.reduce((best,l)=>
!best||(Number(l.sets)>Number(best.sets))?l:best, null);
const latestABC = abcLogs[abcLogs.length-1];
const latestPress = pressLogs[pressLogs.length-1];

const FEEL = ["💀","😓","😐","💪","🔥"];
const SLEEP = ["","★","★★","★★★","★★★★","★★★★★"];
const STRESS = ["","▲","▲▲","▲▲▲","▲▲▲▲","▲▲▲▲▲"];

let lines = [];
lines.push(`TRÄNINGSDATA – exporterad ${today.toLocaleDateString("sv-SE")}`);
lines.push(`Program: ${goals.programName||"ABF"} · Mål: ${goals.goalDate||"31 dec 2026"}`);
lines.push(`Schema-index: pass ${passIndex} av 25`);
lines.push(`Totalt: ${logs.length} pass (${pressLogs.length} Press · ${abcLogs.length} ABC · ${wwLogs.length} WW)`);
lines.push("");

if (bestABC) lines.push(`Bästa ABC: ${bestABC.sets} set @ ${bestABC.secPerSet}s (${bestABC.date})`);
if (latestABC) lines.push(`Senaste ABC: ${latestABC.sets} set @ ${latestABC.secPerSet}s (${latestABC.date})`);
if (latestPress) {
const pp = totalPP(latestPress);
lines.push(`Senaste Press: ${latestPress.steges?.length||0} stegar · ${pp===0?"rent":pp+" PP"} (${latestPress.date})`);
}
lines.push("");
lines.push("ALLA PASS:");

const wkRanges = [
["2026-03-30","2026-04-06","V1"],["2026-04-07","2026-04-13","V2"],
["2026-04-14","2026-04-20","V3"],["2026-04-21","2026-04-27","V4"],
["2026-04-28","2026-05-04","V5"],["2026-05-05","2026-05-11","V6"],
["2026-05-12","2026-05-18","V7"],["2026-05-19","2026-05-25","V8"],
];

wkRanges.forEach(([from,to,label])=>{
const wl = allLogs.filter(l=>l.date>=from&&l.date<=to);
if (wl.length===0) return;
lines.push(`${label}:`);
wl.forEach(l=>{
let detail = "";
if (l.type==="ABC") {
detail = `${l.sets} set @ ${l.secPerSet}s`;
if (l.pauses?.length>0) detail += ` · ${l.pauses.length} paus`;
if (l.bonusSets&&Number(l.bonusSets)>0) detail += ` · +${l.bonusSets}@20`;
} else if (l.type==="Press") {
detail = `${l.steges?.length||0} stegar · ${totalPP(l)===0?"rent":totalPP(l)+" PP"}`;
} else if (l.type==="WW") {
detail = `${l.wwRounds?.length||0} ronder · ${l.wwKg||"?"}kg · ${l.wwRounds?.filter(r=>r.length===5).length||0} kompl`;
} else if (l.type==="Annat") {
detail = l.otherTitle||"";
}
const feeling = FEEL[l.feeling??2];
const sleep = SLEEP[l.sleep||2];
const stress = STRESS[l.stress||2];
const prehab = [l.prehabArms&&"armar",l.prehabKnees&&"knän"].filter(Boolean).join("+");

lines.push(`  ${l.date} ${l.type}: ${detail} · ${feeling} sömn:${sleep} stress:${stress}${prehab?" · prehab:"+prehab:""}`);
if (l.bodyLog) lines.push(`    kropp: ${l.bodyLog}`);
if (l.notes) lines.push(`    not: ${l.notes}`);
if (l.type==="WW"&&l.wwNotes) lines.push(`    ww-not: ${l.wwNotes}`);
});
});

const allScheduledDates = new Set(wkRanges.flatMap(([f,t])=>
allLogs.filter(l=>l.date>=f&&l.date<=t).map(l=>l.date)
));
const unscheduled = allLogs.filter(l=>!allScheduledDates.has(l.date));
if (unscheduled.length>0) {
lines.push("Övriga pass:");
unscheduled.forEach(l=>{
lines.push(`  ${l.date} ${l.type}: ${l.otherTitle||l.wwNotes||""}`);
if(l.bodyLog) lines.push(`    kropp: ${l.bodyLog}`);
});
}

return lines.join("\n");
}

// Helper: format a single rep-cell summary with weight always visible
function repSummary(d, reps) {
if (!d) return null;
const pp = d.pp || 0;
const split = d.split || "";
const clean = reps - pp;
if (split) return `${split}`;
if (pp === 0) return `${reps}×${d.kg}✓`;
return `${clean}✓+${pp}PP×${d.kg}`;
}

function App() {
const [logs,setLogs]=useState([]);
const [form,setForm]=useState(emptyForm);

const [loading,setLoading]=useState(true);
const [dbError,setDbError]=useState(null);
const [confirmId,setConfirmId]=useState(null);
const [selectedLog,setSelectedLog]=useState(null);
const [passIndex,setPassIndex]=useState(0);
const [goals,setGoals]=useState({
abcTargetSets:23, abcTargetSec:78,
press2kg:"24", press3kg:"24", press5kg:"20", press10kg:"16",
programName:"ABF", goalDate:"31 dec 2026",
});
const [passOutcomes,setPassOutcomes]=useState({});
const [quote]=useState(()=>QUOTES[Math.floor(Math.random()*QUOTES.length)]);
const [selectedProgram,setSelectedProgram]=useState(null);
const draftTimerRef = useRef(null);

useEffect(()=>{
async function load() {
try {
const [fetchedLogs, idxVal, draftVal, outcomesVal, goalsVal] = await Promise.all([
dbLoadLogs(),
dbLoadState("pass-index"),
dbLoadState(DRAFT_KEY),
dbLoadState("pass-outcomes"),
dbLoadState("goals"),
]);
setLogs(fetchedLogs);
if (idxVal !== null) setPassIndex(Number(idxVal));
if (draftVal) {
try {
const draft = JSON.parse(draftVal);
if (!draft.wwRounds || draft.wwRounds.length === 0) draft.wwRounds = [[]];
setForm(draft);
} catch(e) {}
}
if (outcomesVal) {
try {
const raw = JSON.parse(outcomesVal);
const fixed = {};
Object.entries(raw).forEach(([k,v]) => { fixed[Number(k)] = v; });
setPassOutcomes(fixed);
} catch(e) {}
}
if (goalsVal) { try { setGoals(g=>({...g,...JSON.parse(goalsVal)})); } catch(e) {} }
} catch(e) {
setDbError("Databasfel: " + e.message);
}
setLoading(false);
}
load();
},[]);

useEffect(() => {
if (loading) return;
clearTimeout(draftTimerRef.current);
draftTimerRef.current = setTimeout(async () => {
try { await dbSaveState(DRAFT_KEY, JSON.stringify(form)); } catch(e) {}
}, 10000);
return () => clearTimeout(draftTimerRef.current);
}, [form]);

async function handleSubmit() {
if (!form.date||!form.type) return;
const entry={...form, id: form.id || Date.now()};
try {
await dbSaveLog(entry);
const nl=[entry,...logs].sort((a,b)=>b.date.localeCompare(a.date));
setLogs(nl);
const fresh={...emptyForm,date:todayStr()};
setForm(fresh);
await dbSaveState(DRAFT_KEY, JSON.stringify(fresh));
setSaved(true);
setTimeout(()=>setSaved(false),2000);
setView("history");
} catch(e) { alert("Kunde inte spara passet: "+e.message); }
}

async function saveGoals(g) {
setGoals(g);
try { await dbSaveState("goals", JSON.stringify(g)); } catch(e) { console.error(e); }
}

async function deleteLog(id) {
try {
await dbDeleteLog(id);
setLogs(logs.filter(l=>l.id!==id));
} catch(e) { alert("Kunde inte radera: "+e.message); }
}

async function advancePass(outcome) {
const newOutcomes = {...passOutcomes, [passIndex]: outcome};
setPassOutcomes(newOutcomes);
const newIdx = passIndex + 1;
setPassIndex(newIdx);
try {
await Promise.all([
dbSaveState("pass-index", String(newIdx)),
dbSaveState("pass-outcomes", JSON.stringify(newOutcomes)),
]);
} catch(e) { console.error(e); }
}

async function undoAdvance() {
if (passIndex === 0) return;
const newIdx = passIndex - 1;
const newOutcomes = {...passOutcomes};
delete newOutcomes[newIdx];
setPassIndex(newIdx);
setPassOutcomes(newOutcomes);
try {
await Promise.all([
dbSaveState("pass-index", String(newIdx)),
dbSaveState("pass-outcomes", JSON.stringify(newOutcomes)),
]);
} catch(e) { console.error(e); }
}

async function handleImport(data) {
try {
for (const entry of data.logs) { await dbSaveLog(entry); }
const refreshed = await dbLoadLogs();
setLogs(refreshed);
if (typeof data.passIndex==="number") {
setPassIndex(data.passIndex);
await dbSaveState("pass-index", String(data.passIndex));
}
} catch(e) { alert("Import misslyckades: "+e.message); }
}

{avgRest&&<div>
<div style={{fontSize:"0.55rem",color:"#9A68B8",letterSpacing:"0.1em",textTransform:"uppercase",fontWeight:600,marginBottom:2}}>Snitt vila</div>
<div style={{fontFamily:"'Syne',sans-serif",fontSize:"1rem",fontWeight:800,color:"#4A1A78"}}>{avgRest} sek</div>
<div style={{fontSize:"0.58rem",color:"#9A68B8"}}>per set i snitt</div>
</div>}
</div>
)}
</>
);
})()}

{form.type==="Annat"&&(
<>
<Row label="Vad körde du?"><input type="text" placeholder="t.ex. Löpning, yoga, promenad..." value={form.otherTitle} onChange={e=>setForm({...form,otherTitle:e.target.value})} style={IS}/></Row>
<Row label="Anteckningar (valfritt)"><textarea value={form.otherNotes} onChange={e=>setForm({...form,otherNotes:e.target.value})} placeholder="Hur gick det? Hur länge?" rows={3} style={{...IS,resize:"vertical"}}/></Row>
</>
)}

{form.type==="WW"&&(
<>
<div style={{background:C.ww,border:`1px solid ${C.wwBorder}`,borderRadius:8,padding:"10px 12px",fontSize:"0.72rem",color:C.wwText,lineHeight:1.7}}>
<strong>WW:</strong> 5+5 → 4+4 → 3+3 → 2+2 → 1+1 cleans+squats per rond.
</div>
<Row label="Vikt (kg)">
<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
{["12","16","20","24"].map(w=>(
<button key={w} onClick={()=>setForm({...form,wwKg:w})} style={{
background:form.wwKg===w?C.accentLight:C.bg,
border:`2px solid ${form.wwKg===w?C.accent:C.border2}`,
color:form.wwKg===w?C.accent:C.muted,
padding:"7px 18px",borderRadius:6,cursor:"pointer",
fontSize:"0.85rem",fontWeight:form.wwKg===w?700:500,touchAction:"manipulation",
}}>{w} kg</button>
))}
</div>
</Row>
<Row label="Ronder">
<div style={{display:"flex",flexDirection:"column",gap:10}}>
{form.wwRounds.map((round,ri)=>(
<div key={ri} style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:8,padding:"10px 12px"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:8}}>
<span style={{fontSize:"0.72rem",color:C.muted,fontWeight:600}}>Rond {ri+1}</span>
{form.wwRounds.length>1&&(
<button onClick={()=>setForm({...form,wwRounds:form.wwRounds.filter((_,j)=>j!==ri)})} style={{background:"transparent",border:"none",color:C.faint,cursor:"pointer",fontSize:"0.8rem",touchAction:"manipulation"}}>✕</button>
)}
</div>
<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
{["5+5","4+4","3+3","2+2","1+1"].map(step=>{
const done=round.includes(step);
const newRound=done?round.filter(s=>s!==step):[...round,step];
const newRounds=form.wwRounds.map((r,i)=>i===ri?newRound:r);
return (
<button key={step} onClick={()=>setForm({...form,wwRounds:newRounds})} style={{
background:done?C.accentLight:C.bg,
border:`2px solid ${done?C.accent:C.border2}`,
color:done?C.accent:C.muted,
padding:"6px 12px",borderRadius:6,cursor:"pointer",
fontSize:"0.78rem",fontWeight:done?700:500,touchAction:"manipulation",
}}>{done?"✓ ":""}{step}</button>
);
})}
</div>
<div style={{marginTop:6,fontSize:"0.65rem",color:round.length===5?C.accent:C.faint}}>
{round.length===5?"✓ Komplett rond":`${round.length}/5 steg`}
</div>
</div>
))}
{form.wwRounds.length<5&&(
<button onClick={()=>setForm({...form,wwRounds:[...form.wwRounds,[]]})} style={{background:C.bg,border:`1px dashed ${C.border2}`,color:C.muted,padding:"8px",borderRadius:6,cursor:"pointer",fontSize:"0.7rem",letterSpacing:"0.1em",textTransform:"uppercase",touchAction:"manipulation"}}>
+ Lägg till rond
</button>
)}
</div>
</Row>
<Row label="Anteckningar (valfritt)">
<textarea value={form.wwNotes||""} onChange={e=>setForm({...form,wwNotes:e.target.value})} placeholder="Hur kändes det? Vad var svårt?" rows={2} style={{...IS,resize:"vertical"}}/>
</Row>
</>
)}

<Row label="Känsla">
<div style={{display:"flex",gap:8}}>
{FEELINGS.map((f,i)=>(
<button key={i} onClick={()=>setForm({...form,feeling:i})} style={{background:form.feeling===i?C.accentLight:C.bg,border:`2px solid ${form.feeling===i?C.accent:C.border}`,borderRadius:7,padding:"7px 11px",cursor:"pointer",fontSize:"1.1rem",opacity:form.feeling===i?1:0.35,touchAction:"manipulation"}} title={FEELING_LABELS[i]}>{f}</button>
))}
</div>
</Row>
<Row label="Sömn"><Slider value={form.sleep} onChange={v=>setForm({...form,sleep:v})} labels={["Dålig","","Ok","","Bra"]} accent={C.accent}/></Row>
<Row label="Stress"><Slider value={form.stress} onChange={v=>setForm({...form,stress:v})} labels={["Låg","","Medel","","Hög"]} accent={C.orange}/></Row>

<Row label="Prehab">
<div style={{display:"flex",gap:10}}>
{[["prehabArms","💪 Armar"],["prehabKnees","🦵 Knän"]].map(([key,label])=>(
<button key={key} onClick={()=>setForm({...form,[key]:!form[key]})} style={{background:form[key]?C.accentLight:C.bg,border:`2px solid ${form[key]?C.accent:C.border2}`,color:form[key]?C.accent:C.navText,padding:"10px 18px",borderRadius:8,cursor:"pointer",fontSize:"0.85rem",fontFamily:"inherit",fontWeight:form[key]?700:500,display:"flex",alignItems:"center",gap:6,touchAction:"manipulation"}}>
<span style={{width:16,height:16,borderRadius:3,background:form[key]?C.accent:C.surface,border:`2px solid ${form[key]?C.accent:C.border2}`,display:"inline-flex",alignItems:"center",justifyContent:"center",flexShrink:0}}>
{form[key]&&<span style={{color:"#fff",fontSize:"0.65rem",lineHeight:1}}>✓</span>}
</span>
{label}
</button>
))}
</div>
</Row>

<Row label="Kropp — besvär eller notering"><textarea value={form.bodyLog} onChange={e=>setForm({...form,bodyLog:e.target.value})} placeholder="t.ex. revbenen ok, ingenting..." rows={2} style={{...IS,resize:"vertical"}}/></Row>
<Row label="Anteckningar"><textarea value={form.notes} onChange={e=>setForm({...form,notes:e.target.value})} placeholder="Fritext..." rows={2} style={{...IS,resize:"vertical"}}/></Row>

<button onClick={handleSubmit} style={{background:C.accent,border:"none",color:"#fff",padding:"14px 28px",borderRadius:9,cursor:"pointer",fontFamily:"'Syne',sans-serif",fontWeight:700,fontSize:"1rem",letterSpacing:"0.04em",marginTop:4,touchAction:"manipulation"}}>
{saved?"✓ Sparat!":"Spara pass"}
</button>
</div>
)}

{/* ── HISTORIK ── */}
{view==="history"&&(
<div>
{dbError&&<div style={{background:"#fff0f0",border:"1px solid #f0b8b8",borderRadius:8,padding:"10px 14px",marginBottom:10,fontSize:"0.7rem",color:C.red}}>⚠️ {dbError}</div>}
{!loading&&logs.length===0&&!dbError&&(
<div style={{background:"#fff8e8",border:"1px solid #e8d898",borderRadius:8,padding:"12px 14px",marginBottom:10,fontSize:"0.7rem",color:"#806000",lineHeight:1.7}}>
⚠️ Inga pass i databasen. Kontrollera i Supabase → Table Editor → training_logs att tabellen finns och att RLS-policyn "Allow all" är aktiv. Prova också att logga ett nytt testpass.
</div>
)}
<div className="history-card-mobile">
{loading&&<p style={{color:C.muted,fontSize:"0.75rem"}}>Laddar...</p>}
{logs.map(l=><LogCard key={l.id} l={l} onSelect={setSelectedLog} confirmId={confirmId} setConfirmId={setConfirmId} deleteLog={deleteLog}/>)}
</div>
<div className="history-card-desktop">
{loading&&<p style={{color:C.muted,fontSize:"0.75rem"}}>Laddar...</p>}
{!loading&&logs.length===0&&<p style={{color:C.muted,fontSize:"0.75rem"}}>Inga loggade pass ännu.</p>}
{(()=>{
const wkRanges = [
["2026-03-30","2026-04-06"],
["2026-04-07","2026-04-13"],
["2026-04-14","2026-04-20"],
["2026-04-21","2026-04-27"],
["2026-04-28","2026-05-04"],
["2026-05-05","2026-05-11"],
["2026-05-12","2026-05-18"],
["2026-05-19","2026-05-25"],
["2026-05-26","2026-05-31"],
];

const today = todayStr();
const shownIds = new Set();

const weekRowsReal = WEEK_SCHEDULE.map((week,wi)=>{
const [wFrom, wTo] = wkRanges[wi] || ["2099-01-01","2099-01-02"];
if (wFrom > today) return null;

const weekLogs = [...logs]
.filter(l=>l.date>=wFrom&&l.date<=wTo)
.sort((a,b)=>a.date.localeCompare(b.date));
weekLogs.forEach(l=>shownIds.add(l.id));

const weekPasses = week.passes.filter(Boolean);
const assignedLogs = weekPasses.map((_,pi)=>weekLogs[pi]||null);

return (
<div key={wi} className="history-week-row">
<div style={{display:"flex",flexDirection:"column",paddingTop:6}}>
<div style={{fontSize:"0.7rem",fontFamily:"'Syne',sans-serif",fontWeight:700,color:C.accent}}>{week.week}</div>
<div style={{fontSize:"0.55rem",color:C.faint}}>{week.phase}</div>
<div style={{fontSize:"0.48rem",color:C.faint}}>{week.dateRange}</div>
</div>
{weekPasses.map((p,pi)=>{
if(week.passes[pi]===null) return <div key={pi} style={{visibility:"hidden"}}/>;
const logged = assignedLogs[pi];
return <LogCardCompact key={pi} l={logged} schedPass={p} onSelect={setSelectedLog} confirmId={confirmId} setConfirmId={setConfirmId} deleteLog={deleteLog}/>;
})}
</div>
);
});

const unscheduled = logs.filter(l=>!shownIds.has(l.id));
return (
<>
{weekRowsReal}
{unscheduled.length>0&&(
<div style={{marginTop:12}}>
<div style={{fontSize:"0.65rem",fontFamily:"'Syne',sans-serif",fontWeight:700,color:C.accent,marginBottom:8,paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>Övriga pass</div>
<div style={{display:"flex",flexDirection:"column",gap:8}}>
{unscheduled.map(l=><LogCard key={l.id} l={l} onSelect={setSelectedLog} confirmId={confirmId} setConfirmId={setConfirmId} deleteLog={deleteLog}/>)}
</div>
</div>
)}
</>
);
})()}
</div>
</div>
)}

{/* ── TREND ── */}
{view==="chart"&&(
<div style={{display:"flex",flexDirection:"column",gap:16,maxWidth:680}}>

{/* ── ABC-SEKTION ── */}
<div style={{...labelStyle,fontSize:"0.65rem",paddingBottom:6,borderBottom:`1px solid ${C.border}`}}>ABC – Prestation</div>
{abcSorted.length>1?(
<>
<ChartBlock title="ABC — Set per pass" data={abcSorted.map(l=>({label:shortDate(l.date),val:Number(l.sets)}))} color={C.abcText} max={30} target={23} targetLabel="mål 23"/>
<ChartBlock title="ABC — Sek / set" data={abcSorted.map(l=>({label:shortDate(l.date),val:Number(l.secPerSet)}))} color={C.accent} max={95} target={78} targetLabel="mål 78" lowerIsBetter/>
{abcSorted.some(l=>l.pauses?.length>0)&&(
<ChartBlock title="ABC — Pauser per pass" data={abcSorted.map(l=>({label:shortDate(l.date),val:l.pauses?.length||0}))} color={C.orange} max={5} target={0} targetLabel="mål 0" lowerIsBetter/>
)}
{abcSorted.some(l=>l.bonusSets&&Number(l.bonusSets)>0)&&(
<ChartBlock title="ABC — Bonusset @ 20 kg" data={abcSorted.map(l=>({label:shortDate(l.date),val:Number(l.bonusSets)||0}))} color={C.ww} max={10}/>
)}
</>
):<Empty text="Logga minst 2 ABC-pass för att se trend"/>}

{/* ── PRESS-SEKTION ── */}
<div style={{...labelStyle,fontSize:"0.65rem",paddingBottom:6,borderBottom:`1px solid ${C.border}`,marginTop:8}}>Giant 3.0 – Volym per pass</div>
{(()=>{
const giantLogs=allLogsSorted.filter(l=>l.type==="Giant"&&l.giantSets&&l.giantKg);
if(giantLogs.length<2) return <Empty text="Logga minst 2 Giant-pass för att se trend"/>;
// Separera per dag-typ
const byDay={"1":[],"2":[],"3":[]};
giantLogs.forEach(l=>{const d=l.giantDay||"1";if(byDay[d])byDay[d].push(l);});
const dayLabels={"1":"Dag 1 (2r)","2":"Dag 2 (3r)","3":"Dag 3 (1r)"};
const dayColors={"1":"#4A1A78","2":"#9A68B8","3":"#C8A8D8"};
return (
<>
<ChartBlock title="Giant — Antal set per pass (alla dagar)" data={giantLogs.map(l=>({label:`D${l.giantDay||"?"} ${shortDate(l.date)}`,val:Number(l.giantSets)}))} color="#4A1A78" max={30}/>
<ChartBlock title="Giant — Total volym per pass (kg)" data={giantLogs.map(l=>{const reps=GIANT_REPS[l.giantDay]||1;const vol=Number(l.giantSets)*reps*Number(l.giantKg)*2;return {label:`D${l.giantDay||"?"} ${shortDate(l.date)}`,val:vol};})} color="#9A68B8" max={5000}/>
{giantLogs.some(l=>l.giantMinutes&&l.giantSets)&&(
<ChartBlock title="Giant — Snitt vila per set (sek)" data={giantLogs.filter(l=>l.giantMinutes&&l.giantSets).map(l=>({label:`D${l.giantDay||"?"} ${shortDate(l.date)}`,val:Math.round((Number(l.giantMinutes)*60)/Number(l.giantSets))}))} color="#C8A8D8" max={180} lowerIsBetter/>
)}
</>
);
})()}

<div style={{...labelStyle,fontSize:"0.65rem",paddingBottom:6,borderBottom:`1px solid ${C.border}`,marginTop:8}}>Press – Prestation</div>
{pressSorted.length>1?(
<>
<ChartBlock title="Press — Push press per pass" data={pressSorted.map(l=>({label:shortDate(l.date),val:totalPP(l)}))} color={C.orange} max={20} target={0} targetLabel="mål 0" lowerIsBetter/>
<ChartBlock title="Press — Antal stegar" data={pressSorted.map(l=>({label:shortDate(l.date),val:l.steges?.length||0}))} color={C.pressText} max={12}/>
</>
):<Empty text="Logga minst 2 press-pass för att se PP-trend"/>}

{/* ── VÄLMÅENDE-SEKTION ── */}
<div style={{...labelStyle,fontSize:"0.65rem",paddingBottom:6,borderBottom:`1px solid ${C.border}`,marginTop:8}}>Välmående – Över tid</div>
{allWithFeeling.length>1?(
<>
<MultiLineChart
title="Känsla · Sömn · Stress per pass"
series={[
{label:"Känsla 💪",color:C.accent,data:allWithFeeling.map(l=>({label:shortDate(l.date),val:(l.feeling??2)+1}))},
{label:"Sömn ★",color:C.pressText,data:allWithFeeling.map(l=>({label:shortDate(l.date),val:l.sleep||2}))},
{label:"Stress ▲",color:C.orange,data:allWithFeeling.map(l=>({label:shortDate(l.date),val:l.stress||2}))},
]}
/>
{/* Känsla vs ABC-prestation – bara om vi har matchade data */}
{(()=>{
const abcWithFeeling=abcSorted.filter(l=>l.feeling!=null);
if(abcWithFeeling.length<2) return null;
return (
<MultiLineChart
title="ABC-set vs Känsla (normaliserat)"
series={[
{label:"Set (÷2)",color:C.abcText,data:abcWithFeeling.map(l=>({label:shortDate(l.date),val:Math.round(Number(l.sets)/2)}))},
{label:"Känsla",color:C.accent,data:abcWithFeeling.map(l=>({label:shortDate(l.date),val:(l.feeling??2)+1}))},
]}
/>
);
})()}
</>
):<Empty text="Logga fler pass för att se välmående-trend"/>}

{/* ── PREHAB-SEKTION ── */}
{(()=>{
const withPrehab=allLogsSorted.filter(l=>l.prehabArms||l.prehabKnees);
if(withPrehab.length<2) return null;
// Prehab per vecka
const weekCounts={};
withPrehab.forEach(l=>{
const d=new Date(l.date+"T12:00:00");
const mon=new Date(d); mon.setDate(d.getDate()-((d.getDay()+6)%7));
const wk=mon.toISOString().split("T")[0];
weekCounts[wk]=(weekCounts[wk]||0)+1;
});
const wkData=Object.entries(weekCounts).sort((a,b)=>a[0].localeCompare(b[0])).map(([wk,v])=>{
const d=new Date(wk+"T12:00:00");
return {label:`v${Math.ceil((d.getDate())/7)} ${["jan","feb","mar","apr","maj","jun","jul","aug","sep","okt","nov","dec"][d.getMonth()]}`,val:v};
});
return (
<>
<div style={{...labelStyle,fontSize:"0.65rem",paddingBottom:6,borderBottom:`1px solid ${C.border}`,marginTop:8}}>Prehab – Frekvens</div>
<BarChart title="Prehab-pass per vecka" data={wkData} color={C.accent} maxVal={6}/>
</>
);
})()}

{/* ── KROPPSLOGG ── */}
<div style={{...labelStyle,fontSize:"0.65rem",paddingBottom:6,borderBottom:`1px solid ${C.border}`,marginTop:8}}>Kroppslogg</div>
{logs.filter(l=>l.bodyLog).length===0?
<Empty text="Inga kroppsnoteringar ännu"/>:
<div style={{background:C.surface,border:`1px solid ${C.border}`,borderRadius:10,padding:"14px 16px",boxShadow:`0 1px 3px ${C.shadow}`}}>
{logs.filter(l=>l.bodyLog).map(l=>(
<div key={l.id} style={{marginBottom:10,paddingBottom:8,borderBottom:`1px solid ${C.border}`}}>
<span style={{fontSize:"0.62rem",color:C.muted}}>{formatDate(l.date)} · {l.type}</span>
<p style={{fontSize:"0.68rem",color:C.orange,marginTop:3,lineHeight:1.5}}>{l.bodyLog}</p>
</div>
))}
</div>
}

</div>
)}

{view==="settings"&&<SettingsView logs={logs} passIndex={passIndex} onImport={handleImport} goals={goals} onSaveGoals={saveGoals}/>}
</div>
</div>
);
}

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>

</body>
</html>
